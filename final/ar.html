<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>구름빵 AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js Location-based (GPS) — 버전 고정 -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.0/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Gaegu', cursive; }

    #distance-hud {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #00ff80;
      font-size: 14px;
      padding: 8px 18px;
      border-radius: 20px;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }

    #catch-btn {
      display: none;
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,200,100,0.92);
      color: #003a18;
      border: none;
      padding: 16px 36px;
      border-radius: 30px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      z-index: 999;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: translateX(-50%) scale(1); }
      50%      { transform: translateX(-50%) scale(1.06); }
    }

    #too-far {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      color: white;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 998;
      text-align: center;
      padding: 32px;
    }
    #too-far h2 { font-size: 24px; margin-bottom: 12px; }
    #too-far p  { font-size: 16px; line-height: 1.8; color: #aaa; }
    #too-far .dist-text { font-size: 28px; color: #f0c060; margin: 16px 0; }
  </style>
</head>
<body>

<div id="distance-hud">📍 위치 확인 중...</div>
<button id="catch-btn" onclick="catchCloud()">☁ 구름 따기!</button>

<div id="too-far">
  <h2>☁ 구름이 저 멀리 있어요!</h2>
  <div class="dist-text" id="far-dist-text">— m</div>
  <p>공원 나무 앞으로<br>이동해주세요 🌳</p>
</div>

<!-- ═══ A-Frame AR 씬 ═══ -->
<a-scene
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false; locationEnabled: true;"
  renderer="antialias: true; alpha: true"
  embedded>

  <!-- ✅ gps-new-camera 사용 -->
  <a-camera gps-new-camera rotation-reader></a-camera>

  <!-- ✅ gps-new-entity-place 사용, scale 제거 -->
  <a-entity
    id="cloud-entity"
    gps-new-entity-place="latitude: 37.638141; longitude: 127.025789">

    <!-- 구름 본체: position으로 높이 조절, scale 없앰 -->
    <a-entity
      id="cloud-inner"
      position="0 3 0"
      animation="property: position; to: 0 3.4 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine">

      <!-- 나무에 걸쳐 보이는 크기 (반지름 1~2m 수준) -->
      <a-sphere color="#e8f4ff" radius="1.2"  position="0 0 0"          opacity="0.92"></a-sphere>
      <a-sphere color="#ddeeff" radius="0.9"  position="-1.1 -0.2 0"    opacity="0.90"></a-sphere>
      <a-sphere color="#ddeeff" radius="1.0"  position="1.1 -0.1 0"     opacity="0.90"></a-sphere>
      <a-sphere color="#f0f8ff" radius="0.7"  position="-0.7 0.6 0"     opacity="0.88"></a-sphere>
      <a-sphere color="#f0f8ff" radius="0.75" position="0.7 0.7 0"      opacity="0.88"></a-sphere>
      <a-sphere color="#ffffff" radius="0.65" position="0 1.0 0"        opacity="0.85"></a-sphere>
      <a-sphere color="#eef6ff" radius="0.55" position="0.3 0.1 0.8"    opacity="0.80"></a-sphere>
      <a-sphere color="#eef6ff" radius="0.5"  position="-0.3 0 0.7"     opacity="0.80"></a-sphere>

      <!-- 반짝이 파티클 -->
      <a-sphere color="#ffffaa" radius="0.08" position="1.5 1.0 0.2"
        animation="property: position; to: 1.6 1.4 0.2; dur: 1800; dir: alternate; loop: true;"></a-sphere>
      <a-sphere color="#aaffdd" radius="0.07" position="-1.4 0.8 0.1"
        animation="property: position; to: -1.5 1.2 0.1; dur: 2200; dir: alternate; loop: true;"></a-sphere>
      <a-sphere color="#ffddaa" radius="0.06" position="0.2 1.6 0.3"
        animation="property: position; to: 0.3 2.0 0.3; dur: 1500; dir: alternate; loop: true;"></a-sphere>

      <!-- 투명 클릭 영역 -->
      <a-sphere color="#ffffff" radius="2.2" opacity="0" class="clickable" cursor-listener></a-sphere>
    </a-entity>
  </a-entity>

  <a-entity cursor="fuse: false" raycaster="objects: .clickable"></a-entity>

</a-scene>

<script>
  const arStage = sessionStorage.getItem('arStage') || 'first';
  if (arStage === 'second') {
    document.getElementById('catch-btn').textContent = '☁ 구름빵 만들기!';
  }

  const TARGET_LAT = 37.638141;
  const TARGET_LNG = 127.025789;
  const CATCH_RADIUS = 15;
  const VISIBLE_RADIUS = 80;

  const hud      = document.getElementById('distance-hud');
  const catchBtn = document.getElementById('catch-btn');
  const tooFar   = document.getElementById('too-far');
  const farText  = document.getElementById('far-dist-text');

  function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function onPosition(pos) {
    const { latitude, longitude } = pos.coords;
    const dist = Math.round(calcDistance(latitude, longitude, TARGET_LAT, TARGET_LNG));

    hud.textContent = `📍 나무까지 ${dist}m`;

    if (dist <= CATCH_RADIUS) {
      hud.style.background = 'rgba(0,160,80,0.7)';
      catchBtn.style.display = 'block';
      tooFar.style.display   = 'none';
    } else if (dist <= VISIBLE_RADIUS) {
      hud.style.background = 'rgba(0,0,0,0.6)';
      catchBtn.style.display = 'none';
      tooFar.style.display   = 'none';
    } else {
      hud.style.background = 'rgba(0,0,0,0.6)';
      catchBtn.style.display = 'none';
      tooFar.style.display   = 'flex';
      farText.textContent    = `${dist}m`;
    }
  }

  function onError(err) {
    hud.textContent = '⚠ GPS 권한을 허용해주세요';
    console.warn('GPS 오류:', err.message);
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000
    });
  } else {
    hud.textContent = '⚠ GPS를 지원하지 않는 브라우저예요';
  }

  AFRAME.registerComponent('cursor-listener', {
    init: function () {
      this.el.addEventListener('click', function () {
        if (catchBtn.style.display !== 'none') catchCloud();
      });
    }
  });

  function catchCloud() {
    // ✅ GPS 앵커(cloud-entity) 말고 자식(cloud-inner)을 움직임
    const cloud = document.getElementById('cloud-inner');
    cloud.setAttribute('animation__up',   'property: position; to: 0 30 0; dur: 800; easing: easeInCubic');
    cloud.setAttribute('animation__fade', 'property: scale;    to: 0 0 0;  dur: 800; easing: easeInCubic');

    catchBtn.style.display = 'none';
    hud.textContent = arStage === 'second' ? '☁ 구름빵을 만들어요!' : '☁ 구름을 땄어요!';

    setTimeout(() => {
      sessionStorage.setItem('arReturn', arStage);
      sessionStorage.removeItem('arStage');
      window.location.href = 'book.html';
    }, 900);
  }
</script>

</body>
</html>
