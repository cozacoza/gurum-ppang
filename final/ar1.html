<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵 AR — 구름 따기</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { overflow:hidden; font-family:'Malgun Gothic','맑은 고딕',sans-serif; background:#000; }
    a-scene { position:fixed; inset:0; }

    #instruction {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.65); color:white;
      font-size:15px; padding:10px 22px; border-radius:20px;
      z-index:999; white-space:nowrap; pointer-events:none;
      transition: opacity 0.4s;
    }

    #catch-btn {
      display:none;
      position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
      background:rgba(0,200,100,0.92); color:#003a18;
      border:none; padding:16px 36px; border-radius:30px;
      font-size:22px; font-weight:700; cursor:pointer; z-index:999;
      animation:pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ transform:translateX(-50%) scale(1); }
      50%     { transform:translateX(-50%) scale(1.06); }
    }
  </style>
</head>
<body>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.75;"
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
>
  <!-- 발자국 마커 위에 구름 -->
  <a-marker id="paw-marker" type="pattern" url="paw-marker.patt">
    <a-entity position="0 0.8 0" id="cloud-obj">
      <a-sphere position="0 0 0"       radius="0.35" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="-0.35 0.1 0" radius="0.25" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="0.35 0.1 0"  radius="0.22" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="0 0.28 0"    radius="0.23" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="-0.15 0.3 0" radius="0.18" color="white" opacity="0.90" material="shader:flat;"></a-sphere>
      <a-sphere position="0.15 0.25 0" radius="0.16" color="white" opacity="0.90" material="shader:flat;"></a-sphere>
    </a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<div id="instruction">🐾 발자국 마커를 카메라로 비춰주세요</div>
<button id="catch-btn" onclick="catchCloud()">☁ 구름 따기!</button>

<script>
  const marker   = document.getElementById('paw-marker');
  const cloudObj = document.getElementById('cloud-obj');
  const catchBtn = document.getElementById('catch-btn');
  const instr    = document.getElementById('instruction');

  marker.addEventListener('markerFound', () => {
    instr.textContent = '☁ 구름을 발견했어요!';
    catchBtn.style.display = 'block';
  });

  marker.addEventListener('markerLost', () => {
    instr.textContent = '🐾 발자국 마커를 카메라로 비춰주세요';
    catchBtn.style.display = 'none';
  });

  function catchCloud() {
    catchBtn.style.display = 'none';
    instr.textContent = '☁ 구름을 땄어요!';
    cloudObj.setAttribute('animation',
      'property: scale; to: 0 0 0; dur: 800; easing: easeInBack;'
    );
    setTimeout(() => {
      sessionStorage.setItem('caughtCloud', '1');
      window.location.href = 'book1.html';
    }, 900);
  }
</script>
</body>
</html>
