<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵 AR — 구름 따기</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { overflow:hidden; font-family:'Malgun Gothic','맑은 고딕',sans-serif; }
    a-scene { position:fixed; inset:0; }

    #permission-overlay {
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,0.88);
      color:white; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:32px; gap:20px;
    }
    #permission-overlay h2 { font-size:22px; }
    #permission-overlay p  { font-size:15px; color:#ccc; line-height:1.8; }
    #permission-btn {
      background:#00c864; color:#003a18; border:none;
      padding:16px 40px; border-radius:30px;
      font-size:20px; font-weight:700; cursor:pointer;
    }

    #distance-hud {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#00ff80;
      font-size:14px; padding:8px 18px; border-radius:20px;
      z-index:999; white-space:nowrap; pointer-events:none;
    }

    #catch-btn {
      display:none;
      position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
      background:rgba(0,200,100,0.92); color:#003a18;
      border:none; padding:16px 36px; border-radius:30px;
      font-size:22px; font-weight:700; cursor:pointer; z-index:999;
      animation:pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ transform:translateX(-50%) scale(1); }
      50%     { transform:translateX(-50%) scale(1.06); }
    }

    #too-far {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.75); color:white;
      flex-direction:column; align-items:center; justify-content:center;
      z-index:998; text-align:center; padding:32px;
    }
    #too-far h2  { font-size:24px; margin-bottom:12px; }
    #too-far p   { font-size:16px; line-height:1.8; color:#aaa; }
    #too-far .dist-text { font-size:28px; color:#f0c060; margin:16px 0; }
  </style>
</head>
<body>

<!-- AR 씬 (A-Frame + AR.js GPS 위치 기반) -->
<a-scene
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
  embedded
>
  <!-- 구름 — 목표 GPS 좌표에 고정 -->
  <a-entity
    id="cloud-entity"
    gps-entity-place="latitude: 37.6527429; longitude: 127.0163955;"
    visible="false"
  >
    <!-- 지면에서 10m 위에 구름 배치 -->
    <a-entity position="0 10 0">
      <a-sphere position="0 0 0"     radius="3.5" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="-3.5 1 0"  radius="2.5" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="3.5 1 0"   radius="2.2" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="0 2.8 0"   radius="2.3" color="white" opacity="0.95" material="shader:flat;"></a-sphere>
      <a-sphere position="-1.5 3 0"  radius="1.8" color="white" opacity="0.90" material="shader:flat;"></a-sphere>
      <a-sphere position="1.5 2.5 0" radius="1.6" color="white" opacity="0.90" material="shader:flat;"></a-sphere>
    </a-entity>
  </a-entity>

  <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<div id="distance-hud">📍 위치 확인 중...</div>

<div id="too-far">
  <h2>☁ 구름이 저 멀리 있어요!</h2>
  <div class="dist-text" id="far-dist-text">— m</div>
  <p>나무 앞으로<br>이동해주세요 🌳</p>
</div>

<button id="catch-btn" onclick="catchCloud()">☁ 구름 따기!</button>

<div id="permission-overlay">
  <h2>☁ 구름빵 AR</h2>
  <p>구름을 찾으려면<br>위치와 카메라 권한이 필요해요</p>
  <button id="permission-btn" onclick="requestPermissions()">시작하기</button>
</div>

<script>
  const TARGET_LAT     = 37.6527429;
  const TARGET_LNG     = 127.0163955;
  const CATCH_RADIUS   = 15;
  const VISIBLE_RADIUS = 80;

  const hud         = document.getElementById('distance-hud');
  const catchBtn    = document.getElementById('catch-btn');
  const tooFar      = document.getElementById('too-far');
  const farText     = document.getElementById('far-dist-text');
  const cloudEntity = document.getElementById('cloud-entity');

  function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function requestPermissions() {
    // iOS 13+ 방향 센서 권한
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r !== 'granted') { alert('방향 센서 권한을 허용해야 AR이 정상 작동해요.'); return; }
      } catch(e) {}
    }
    document.getElementById('permission-overlay').style.display = 'none';
    startGPS();
  }

  function startGPS() {
    if (!navigator.geolocation) { hud.textContent = '⚠ GPS를 지원하지 않는 브라우저예요'; return; }
    navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy:true, maximumAge:3000, timeout:10000
    });
  }

  function onPosition(pos) {
    const { latitude, longitude } = pos.coords;
    const dist = Math.round(calcDistance(latitude, longitude, TARGET_LAT, TARGET_LNG));
    hud.textContent = `📍 나무까지 ${dist}m`;

    if (dist > VISIBLE_RADIUS) {
      cloudEntity.setAttribute('visible', 'false');
      catchBtn.style.display = 'none';
      tooFar.style.display   = 'flex';
      farText.textContent    = `${dist}m`;
      hud.style.background   = 'rgba(0,0,0,0.6)';
    } else {
      cloudEntity.setAttribute('visible', 'true');
      tooFar.style.display   = 'none';
      catchBtn.style.display = dist <= CATCH_RADIUS ? 'block' : 'none';
      hud.style.background   = dist <= CATCH_RADIUS ? 'rgba(0,160,80,0.7)' : 'rgba(0,0,0,0.6)';
    }
  }

  function onError() { hud.textContent = '⚠ GPS 권한을 허용해주세요'; }

  function catchCloud() {
    catchBtn.style.display = 'none';
    cloudEntity.setAttribute('visible', 'false');
    hud.textContent = '☁ 구름을 땄어요!';
    setTimeout(() => {
      sessionStorage.setItem('caughtCloud', '1');
      window.location.href = 'book1.html';
    }, 900);
  }
</script>
</body>
</html>
