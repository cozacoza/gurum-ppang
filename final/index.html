<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    iframe {
      position:fixed; inset:0;
      width:100%; height:100%;
      border:none;
    }
    #start-screen {
      position:fixed; inset:0; z-index:20;
      background:#0d0600;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      cursor:pointer;
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    #start-cloud { font-size:72px; filter:drop-shadow(0 0 24px rgba(255,200,80,0.9)); }
    #start-title {
      font-size:30px; color:rgba(255,220,140,0.95); letter-spacing:8px;
      text-shadow:0 0 24px rgba(255,150,30,0.8);
    }
    #start-hint {
      font-size:13px; color:rgba(255,180,60,0.55); letter-spacing:3px;
      margin-top:14px;
      animation:startPulse 2s ease-in-out infinite;
    }
    @keyframes startPulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
  </style>
</head>
<body>

<audio id="ost" src="ost.mp3" loop preload="auto"></audio>

<iframe
  id="frame"
  src="book1.html"
  allow="camera; microphone; geolocation; accelerometer; gyroscope; magnetometer; autoplay"
  allowfullscreen>
</iframe>

<div id="start-screen" onclick="begin()" ontouchstart="begin()">
  <div id="start-cloud">☁</div>
  <div id="start-title">구름빵</div>
  <div id="start-hint">터치하여 시작</div>
</div>

<script>
  const ost = document.getElementById('ost');
  ost.volume = 0.5;

  let started = false;
  function startOST() {
    if (started) return;
    started = true;
    ost.play().catch(() => {});
  }

  function begin() {
    startOST();
    document.getElementById('start-screen').style.display = 'none';
  }

  window.addEventListener('message', e => {
    if (e.data === 'ostStart') startOST();
  });
</script>
</body>
</html>
