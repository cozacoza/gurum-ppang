<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    iframe {
      position:fixed; inset:0;
      width:100%; height:100%;
      border:none;
    }
    #start-screen {
      position:fixed; inset:0; z-index:20;
      background:#0d0600;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      cursor:pointer;
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    #start-cloud { font-size:72px; filter:drop-shadow(0 0 24px rgba(255,200,80,0.9)); }
    #start-title {
      font-size:30px; color:rgba(255,220,140,0.95); letter-spacing:8px;
      text-shadow:0 0 24px rgba(255,150,30,0.8);
    }
    #start-hint {
      font-size:13px; color:rgba(255,180,60,0.55); letter-spacing:3px;
      margin-top:14px;
      animation:startPulse 2s ease-in-out infinite;
    }
    @keyframes startPulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
  </style>
</head>
<body>

<audio id="candle" src="candle.mp3" loop preload="auto"></audio>
<audio id="rain"   src="rain.mp3"   loop preload="auto"></audio>
<audio id="ost"    src="ost.mp3"    loop preload="auto"></audio>

<iframe
  id="frame"
  src="book1.html"
  allow="camera; microphone; geolocation; accelerometer; gyroscope; magnetometer; autoplay"
  allowfullscreen>
</iframe>

<div id="start-screen" onclick="begin()" ontouchstart="begin()">
  <div id="start-cloud">☁</div>
  <div id="start-title">구름빵</div>
  <div id="start-hint">터치하여 시작</div>
</div>

<script>
  const candle = document.getElementById('candle');
  const rain   = document.getElementById('rain');
  const ost    = document.getElementById('ost');
  candle.volume = 0;
  rain.volume   = 0;
  ost.volume    = 0;

  let unlocked = false;
  let candleOn = false, rainOn = false, ostOn = false;
  const pending = new Set();

  function begin() {
    if (unlocked) return;
    unlocked = true;
    document.getElementById('start-screen').style.display = 'none';
    // 유저 제스처 안에서 잠금 해제 후 pending 메시지 처리
    Promise.all([candle, rain, ost].map(a =>
      a.play().then(() => a.pause()).catch(() => {})
    )).then(() => {
      pending.forEach(msg => playAudio(msg));
      pending.clear();
    });
  }

  function fadeVol(audio, target, ms) {
    const start = audio.volume, diff = target - start;
    const steps = 40, iv = ms / steps;
    let s = 0;
    const t = setInterval(() => {
      s++;
      audio.volume = Math.min(1, Math.max(0, start + diff * (s / steps)));
      if (s >= steps) clearInterval(t);
    }, iv);
  }

  function playAudio(msg) {
    if (msg === 'candleStart' && !candleOn) {
      candleOn = true;
      candle.currentTime = 0;
      candle.play().catch(() => {});
      fadeVol(candle, 0.105, 4400);
    }
    if (msg === 'rainStart' && !rainOn) {
      rainOn = true;
      rain.currentTime = 0;
      rain.play().catch(() => {});
      fadeVol(rain, 0.7, 2000);
    }
    if (msg === 'ostStart' && !ostOn) {
      ostOn = true;
      ost.currentTime = 0;
      ost.play().catch(() => {});
      fadeVol(ost, 0.5, 2000);
    }
  }

  window.addEventListener('message', e => {
    if (['candleStart', 'rainStart', 'ostStart'].includes(e.data)) {
      if (unlocked) playAudio(e.data);
      else pending.add(e.data);  // 잠금 해제 전 도착한 신호 보관
    }
  });
</script>
</body>
</html>
