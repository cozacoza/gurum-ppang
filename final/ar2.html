<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵 재료 찾기</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Malgun Gothic','맑은 고딕',sans-serif; }

    /* 카메라 배경 */
    #camera { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }

    /* A-Frame 씬 — WebGL 캔버스를 투명하게 */
    a-scene { position:fixed; inset:0; z-index:1; }
    a-scene canvas { background:transparent !important; }

    /* ── 권한 요청 ── */
    #permission-screen {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,5,18,0.95);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:22px; color:#fff; text-align:center; padding:40px;
    }
    #permission-screen .p-icon { font-size:60px; }
    #permission-screen h2 { font-size:22px; }
    #permission-screen p  { font-size:15px; color:#b0c8e8; line-height:2; }
    #permission-btn {
      margin-top:8px; padding:15px 44px; font-size:18px; font-weight:700;
      background:#00c864; color:#003a18; border:none; border-radius:32px;
      cursor:pointer; font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }

    /* ── 진행 HUD ── */
    #progress-hud {
      position:fixed; top:22px; left:50%; transform:translateX(-50%);
      z-index:10; display:flex; flex-direction:column; align-items:center; gap:10px;
      pointer-events:none;
    }
    #progress-label {
      background:rgba(0,0,0,0.55); color:#ffe8b0;
      font-size:13px; letter-spacing:1.5px; padding:6px 20px; border-radius:20px;
      border:1px solid rgba(255,220,140,0.25);
    }
    #progress-dots { display:flex; gap:10px; }
    .p-dot {
      width:34px; height:34px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:center;
      font-size:17px; transition:all 0.4s;
    }
    .p-dot.done {
      border-color:rgba(80,255,140,0.85); background:rgba(40,160,80,0.35);
      box-shadow:0 0 12px rgba(60,255,120,0.5);
    }

    /* ── 설명 카드 (하단) ── */
    #desc-card {
      position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
      z-index:10; width:min(290px,75vw);
      background:rgba(255,255,255,0.90);
      backdrop-filter:blur(14px);
      border-radius:24px;
      padding:18px 22px 16px;
      text-align:center;
      box-shadow:0 10px 36px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.6);
      opacity:0; transition:opacity 0.4s;
      pointer-events:none;
    }
    #desc-card.show { opacity:1; pointer-events:auto; }
    #desc-header {
      display:flex; align-items:center; justify-content:center;
      gap:10px; margin-bottom:10px; padding-bottom:10px;
      border-bottom:1px solid rgba(0,0,0,0.08);
    }
    #desc-emoji { font-size:26px; }
    #desc-name  { font-size:24px; font-weight:700; color:#1a1a1a; letter-spacing:0.5px; }
    #desc-text  { font-size:14px; line-height:1.9; color:#444; margin-bottom:14px; white-space:pre-line; }
    #desc-hint  {
      font-size:12px; letter-spacing:2px; color:rgba(0,0,0,0.32);
      animation:hintBlink 1.6s ease-in-out infinite;
    }
    @keyframes hintBlink { 0%,100%{opacity:0.32} 50%{opacity:0.85} }

    /* ── 획득 플래시 ── */
    #collect-flash {
      position:fixed; top:42%; left:50%;
      transform:translate(-50%,-50%);
      z-index:20; font-size:20px; font-weight:700;
      color:#fff; text-align:center;
      text-shadow:0 0 20px rgba(80,255,140,1), 0 0 40px rgba(80,255,140,0.6);
      opacity:0; pointer-events:none;
    }
    #collect-flash.pop { animation:flashPop 1.1s ease-out forwards; }
    @keyframes flashPop {
      0%   { opacity:0;   transform:translate(-50%,-50%) scale(0.6); }
      25%  { opacity:1;   transform:translate(-50%,-65%) scale(1.1); }
      70%  { opacity:0.9; transform:translate(-50%,-82%) scale(1);   }
      100% { opacity:0;   transform:translate(-50%,-96%) scale(0.9); }
    }

    /* ── 완료 화면 (HUD 패널) ── */
    #complete-screen {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,5,18,0.85); backdrop-filter:blur(4px);
      display:none; align-items:center; justify-content:center;
    }
    #complete-screen.show { display:flex; }
    .hud-glow {
      animation:hudPulse 3s ease-in-out infinite;
      filter:drop-shadow(0 0 6px rgba(0,215,255,.95)) drop-shadow(0 0 22px rgba(0,150,255,.6)) drop-shadow(0 0 55px rgba(0,100,200,.3));
    }
    @keyframes hudPulse {
      0%,100%{ filter:drop-shadow(0 0 6px rgba(0,215,255,.9)) drop-shadow(0 0 22px rgba(0,150,255,.55)) drop-shadow(0 0 55px rgba(0,100,200,.25)); }
      50%    { filter:drop-shadow(0 0 11px rgba(0,235,255,1)) drop-shadow(0 0 35px rgba(0,180,255,.75)) drop-shadow(0 0 75px rgba(0,130,230,.45)); }
    }
    .hud-frame {
      position:relative; width:min(88vw,400px);
      background:rgba(0,10,28,0.97);
      border:1.5px solid rgba(0,210,255,0.85);
      clip-path:polygon(20px 0%,calc(100% - 20px) 0%,100% 20px,100% calc(100% - 20px),calc(100% - 20px) 100%,20px 100%,0% calc(100% - 20px),0% 20px);
      overflow:hidden;
    }
    .hud-frame::before {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
      background:repeating-linear-gradient(0deg,rgba(0,200,255,.022) 0px,rgba(0,200,255,.022) 1px,transparent 1px,transparent 5px);
    }
    .hud-header {
      position:relative; z-index:1;
      display:flex; align-items:center; gap:10px; padding:15px 22px 11px;
      border-bottom:1px solid rgba(0,200,255,0.22);
    }
    .hud-header-icon { font-size:18px; color:rgba(0,230,255,0.9); animation:iconBlink 2s step-start infinite; }
    @keyframes iconBlink { 0%,89%{opacity:1} 90%,99%{opacity:.15} }
    .hud-header-title {
      flex:1; font-family:'Courier New',monospace; font-size:10px; letter-spacing:3.5px;
      color:rgba(0,220,255,0.85); text-shadow:0 0 8px rgba(0,210,255,.7); text-transform:uppercase;
    }
    .hud-header-dots { font-size:10px; color:rgba(0,170,200,0.45); letter-spacing:2px; }
    .hud-body { position:relative; z-index:1; padding:24px 26px 16px; text-align:center; }
    .hud-main-icon { display:block; font-size:50px; margin-bottom:14px; animation:iconFloat 2.8s ease-in-out infinite; }
    @keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .hud-complete-title {
      font-size:16px; font-weight:700; letter-spacing:1px; margin-bottom:10px;
      color:rgba(0,235,255,1); text-shadow:0 0 10px rgba(0,205,255,.85);
    }
    .hud-collected { display:flex; justify-content:center; gap:10px; font-size:26px; margin-bottom:12px; }
    .hud-complete-msg { font-size:14px; line-height:2.1; color:rgba(180,238,255,0.88); }
    .hud-footer {
      position:relative; z-index:1; padding:13px 20px 17px;
      border-top:1px solid rgba(0,200,255,0.18); display:flex; justify-content:center;
    }
    .hud-btn {
      padding:11px 28px; font-size:13px; letter-spacing:1.5px;
      border:1px solid rgba(0,215,255,.8); cursor:pointer;
      background:rgba(0,80,140,.18); color:rgba(0,232,255,1);
      text-shadow:0 0 6px rgba(0,210,255,.6);
      clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    .hud-btn:active { background:rgba(0,150,220,.3); }
  </style>
</head>
<body>

<!-- 카메라 배경 -->
<video id="camera" autoplay muted playsinline></video>

<!-- A-Frame: 투명 씬 위에 GLB 모델 -->
<a-scene
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true"
  background="color: black; transparent: true"
  embedded>

  <a-assets>
    <a-asset-item id="mdl-milk"  src="ing_milk.glb"></a-asset-item>
    <a-asset-item id="mdl-sugar" src="ing_sugar.glb"></a-asset-item>
    <a-asset-item id="mdl-salt"  src="ing_salt.glb"></a-asset-item>
    <a-asset-item id="mdl-yeast" src="ing_yeast.glb"></a-asset-item>
  </a-assets>

  <a-camera id="ar-camera" position="0 1.6 0"
    look-controls="enabled:false" wasd-controls="enabled:false">
  </a-camera>

  <a-entity id="ing-milk"  gltf-model="#mdl-milk"  position="0 1.2 -2.5" scale="0.5 0.5 0.5" visible="false"
    animation="property:rotation; to:0 360 0; dur:4000; loop:true; easing:linear"
    animation__float="property:position; from:0 1.2 -2.5; to:0 1.55 -2.5; dur:2000; loop:true; dir:alternate; easing:easeInOutSine">
  </a-entity>
  <a-entity id="ing-sugar" gltf-model="#mdl-sugar" position="0 1.2 -2.5" scale="0.0625 0.0625 0.0625" visible="false"
    animation="property:rotation; to:0 360 0; dur:4000; loop:true; easing:linear"
    animation__float="property:position; from:0 1.2 -2.5; to:0 1.55 -2.5; dur:2000; loop:true; dir:alternate; easing:easeInOutSine">
  </a-entity>
  <a-entity id="ing-salt"  gltf-model="#mdl-salt"  position="0 1.2 -2.5" scale="15 15 15" visible="false"
    animation="property:rotation; to:0 360 0; dur:4000; loop:true; easing:linear"
    animation__float="property:position; from:0 1.2 -2.5; to:0 1.55 -2.5; dur:2000; loop:true; dir:alternate; easing:easeInOutSine">
  </a-entity>
  <a-entity id="ing-yeast" gltf-model="#mdl-yeast" position="0 1.2 -2.5" scale="0.15 0.15 0.15" visible="false"
    animation="property:rotation; to:0 360 0; dur:4000; loop:true; easing:linear"
    animation__float="property:position; from:0 1.2 -2.5; to:0 1.55 -2.5; dur:2000; loop:true; dir:alternate; easing:easeInOutSine">
  </a-entity>
</a-scene>

<!-- 권한 요청 -->
<div id="permission-screen">
  <div class="p-icon">🍞</div>
  <h2>재료를 찾아요!</h2>
  <p>구름빵 재료를 찾으려면<br>카메라 권한이 필요해요</p>
  <button id="permission-btn" onclick="startAR()">시작하기</button>
</div>

<!-- 진행 HUD -->
<div id="progress-hud">
  <div id="progress-label">재료 0 / 4</div>
  <div id="progress-dots">
    <div class="p-dot" id="dot0">🥛</div>
    <div class="p-dot" id="dot1">🍬</div>
    <div class="p-dot" id="dot2">🧂</div>
    <div class="p-dot" id="dot3">🌾</div>
  </div>
</div>

<!-- 설명 카드 -->
<div id="desc-card">
  <div id="desc-header">
    <span id="desc-emoji"></span>
    <span id="desc-name"></span>
  </div>
  <p id="desc-text"></p>
  <div id="desc-hint">탭해서 획득!</div>
</div>

<!-- 획득 플래시 -->
<div id="collect-flash"></div>

<!-- 완료 화면 -->
<div id="complete-screen">
  <div class="hud-glow">
    <div class="hud-frame">
      <div class="hud-header">
        <span class="hud-header-icon">◈</span>
        <span class="hud-header-title">Mission Complete</span>
        <span class="hud-header-dots">· · · · ·</span>
      </div>
      <div class="hud-body">
        <span class="hud-main-icon">🎉</span>
        <div class="hud-complete-title">재료를 모두 모았어요!</div>
        <div class="hud-collected">🥛🍬🧂🌾</div>
        <p class="hud-complete-msg">우유, 설탕, 소금, 이스트!<br>이제 엄마와 함께<br>구름빵을 만들어봐요.</p>
      </div>
      <div class="hud-footer">
        <button class="hud-btn" onclick="goNext()">[ 계속하기 → ]</button>
      </div>
    </div>
  </div>
</div>

<script>
const INGREDIENTS = [
  { id:'ing-milk',  emoji:'🥛', name:'우유',   desc:'촉촉하고 부드러운\n구름빵의 비밀이에요!',  scale:'0.5 0.5 0.5'          },
  { id:'ing-sugar', emoji:'🍬', name:'설탕',   desc:'달콤한 맛을 내주는\n마법의 재료예요!',    scale:'0.09375 0.09375 0.09375' },
  { id:'ing-salt',  emoji:'🧂', name:'소금',   desc:'맛의 균형을 잡아줘요.\n조금만 넣어도 충분해요!', scale:'7.5 7.5 7.5'     },
  { id:'ing-yeast', emoji:'🌾', name:'이스트', desc:'빵을 폭신하게 만들어요!\n구름처럼 부풀어 올라요.', scale:'0.21 0.21 0.21' },
];

let current = 0;
let busy    = false;

function startAR() {
  document.getElementById('permission-screen').style.display = 'none';

  // 카메라 직접 연결
  navigator.mediaDevices
    .getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(stream => { document.getElementById('camera').srcObject = stream; })
    .catch(() => {});

  showIngredient();
}

function showIngredient() {
  if (current >= INGREDIENTS.length) { showComplete(); return; }

  const ing = INGREDIENTS[current];

  // 모두 숨기고 현재만 표시
  INGREDIENTS.forEach(i => {
    const el = document.getElementById(i.id);
    if (el) {
      el.setAttribute('visible', 'false');
      el.setAttribute('scale', i.scale);
    }
  });
  const el = document.getElementById(ing.id);
  if (el) el.setAttribute('visible', 'true');

  // 설명 카드
  document.getElementById('desc-emoji').textContent = ing.emoji;
  document.getElementById('desc-name').textContent  = ing.name;
  document.getElementById('desc-text').textContent  = ing.desc;
  const card = document.getElementById('desc-card');
  card.classList.remove('show');
  setTimeout(() => card.classList.add('show'), 150);

  document.getElementById('progress-label').textContent = `재료 ${current} / ${INGREDIENTS.length}`;
}

function collect() {
  if (busy) return;
  busy = true;

  const ing = INGREDIENTS[current];
  const el  = document.getElementById(ing.id);

  // 오브젝트 수집 애니메이션 (위로 날아가며 사라짐)
  if (el) {
    el.setAttribute('animation__collect',
      'property:scale; to:0 0 0; dur:350; easing:easeInBack');
    el.setAttribute('animation__rise',
      'property:position; to:0 3.5 -2.5; dur:400; easing:easeInCubic');
    setTimeout(() => el.setAttribute('visible', 'false'), 420);
  }

  // 카드 숨기기
  document.getElementById('desc-card').classList.remove('show');

  // 획득 플래시
  const flash = document.getElementById('collect-flash');
  flash.textContent = `✨ ${ing.name} 획득!`;
  flash.classList.remove('pop');
  void flash.offsetWidth;
  flash.classList.add('pop');

  // 도트 완료 처리
  document.getElementById(`dot${current}`).classList.add('done');
  current++;
  document.getElementById('progress-label').textContent = `재료 ${current} / ${INGREDIENTS.length}`;

  setTimeout(() => {
    busy = false;
    showIngredient();
  }, 700);
}

function showComplete() {
  document.getElementById('desc-card').classList.remove('show');
  document.getElementById('complete-screen').classList.add('show');
}

function goNext() {
  sessionStorage.setItem('ingredientsCollected', '1');
  window.location.href = 'baking.html';
}

// 화면 탭 → 수집
document.addEventListener('click', e => {
  if (e.target.closest('#complete-screen') || e.target.closest('#permission-screen')) return;
  collect();
});
document.addEventListener('touchend', e => {
  if (e.target.closest('#complete-screen') || e.target.closest('#permission-screen')) return;
  e.preventDefault();
  collect();
}, { passive:false });
</script>
</body>
</html>
