<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    canvas { position:fixed; inset:0; width:100%; height:100%; }
    #main-canvas { z-index:0; }
    #page-canvas { z-index:5;  pointer-events:none; }
    #flip-canvas { z-index:10; pointer-events:none; }
    #touch-layer { z-index:20; position:fixed; inset:0; pointer-events:none; }
    #hint {
      position:fixed; bottom:36px; left:50%;
      transform:translateX(-50%);
      color:rgba(255,220,140,0);
      font-size:15px; font-family:serif; letter-spacing:2px;
      white-space:nowrap; pointer-events:none; z-index:30;
      text-shadow:0 0 12px rgba(255,180,60,0.8);
      animation:hintPulse 2s ease-in-out infinite;
      transition:color 0.8s ease;
    }
    @keyframes hintPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* ── HUD 패널 ── */
    #ar-panel {
      display:none; position:fixed; inset:0; z-index:150;
      background:rgba(0,5,18,0.82); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    #ar-panel.show { display:flex; }
    .hud-glow {
      animation:hudPulse 3s ease-in-out infinite;
      filter:drop-shadow(0 0 6px rgba(0,215,255,.95)) drop-shadow(0 0 22px rgba(0,150,255,.6)) drop-shadow(0 0 55px rgba(0,100,200,.3));
    }
    @keyframes hudPulse {
      0%,100%{filter:drop-shadow(0 0 6px rgba(0,215,255,.9)) drop-shadow(0 0 22px rgba(0,150,255,.55)) drop-shadow(0 0 55px rgba(0,100,200,.25))}
      50%    {filter:drop-shadow(0 0 11px rgba(0,235,255,1))  drop-shadow(0 0 35px rgba(0,180,255,.75)) drop-shadow(0 0 75px rgba(0,130,230,.45))}
    }
    .hud-frame {
      position:relative; width:min(88vw,400px);
      background:rgba(0,10,28,0.97);
      border:1.5px solid rgba(0,210,255,0.85);
      clip-path:polygon(20px 0%,calc(100% - 20px) 0%,100% 20px,100% calc(100% - 20px),calc(100% - 20px) 100%,20px 100%,0% calc(100% - 20px),0% 20px);
      overflow:hidden;
    }
    .hud-frame::before {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
      background:repeating-linear-gradient(0deg,rgba(0,200,255,.022) 0px,rgba(0,200,255,.022) 1px,transparent 1px,transparent 5px);
    }
    .hud-frame::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
      background:radial-gradient(ellipse at 18% 10%,rgba(0,140,255,.07) 0%,transparent 60%);
    }
    .hud-header {
      position:relative; z-index:1;
      display:flex; align-items:center; gap:10px;
      padding:15px 22px 11px;
      border-bottom:1px solid rgba(0,200,255,0.22);
    }
    .hud-header-icon {
      font-size:18px; color:rgba(0,230,255,0.9);
      animation:iconBlink 2s step-start infinite;
    }
    @keyframes iconBlink{0%,89%{opacity:1}90%,99%{opacity:.15}}
    .hud-header-title {
      flex:1; font-family:'Courier New',monospace;
      font-size:10px; letter-spacing:3.5px;
      color:rgba(0,220,255,0.85); text-shadow:0 0 8px rgba(0,210,255,.7);
      text-transform:uppercase;
    }
    .hud-header-dots { font-size:10px; color:rgba(0,170,200,0.45); letter-spacing:2px; }
    .hud-body {
      position:relative; z-index:1;
      padding:26px 26px 18px; text-align:center;
    }
    .hud-main-icon {
      display:block; font-size:54px; margin-bottom:16px;
      filter:drop-shadow(0 0 14px rgba(150,225,255,.95));
      animation:iconFloat 2.8s ease-in-out infinite;
    }
    @keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .hud-mission-title {
      font-size:16px; font-weight:700; letter-spacing:1px; margin-bottom:14px;
      color:rgba(0,235,255,1); text-shadow:0 0 10px rgba(0,205,255,.85);
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    #hud-msg {
      font-size:14px; line-height:2.1; letter-spacing:0.3px;
      color:rgba(180,238,255,0.88);
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    .hud-footer {
      position:relative; z-index:1;
      display:flex; gap:10px; padding:13px 20px 17px;
      border-top:1px solid rgba(0,200,255,0.18); justify-content:center;
    }
    .hud-btn {
      padding:11px 22px; font-size:13px; letter-spacing:1.5px;
      border:1px solid; cursor:pointer; background:transparent;
      transition:background .15s;
      clip-path:polygon(8px 0%,calc(100%-8px) 0%,100% 8px,100% calc(100%-8px),calc(100%-8px) 100%,8px 100%,0% calc(100%-8px),0% 8px);
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    .hud-btn-cancel { color:rgba(0,170,195,.6); border-color:rgba(0,170,195,.35); }
    .hud-btn-cancel:active { background:rgba(0,170,195,.12); }
    .hud-btn-go {
      color:rgba(0,232,255,1); border-color:rgba(0,215,255,.8);
      background:rgba(0,80,140,.18); text-shadow:0 0 6px rgba(0,210,255,.6);
    }
    .hud-btn-go:active { background:rgba(0,150,220,.3); }

    #page-num {
      position:fixed; bottom:14px; left:50%;
      transform:translateX(-50%);
      color:rgba(255,200,100,0.3); font-size:12px; font-family:serif;
      letter-spacing:2px; pointer-events:none; z-index:30;
    }
  </style>
</head>
<body>
<canvas id="main-canvas"></canvas>
<canvas id="page-canvas"></canvas>
<canvas id="flip-canvas"></canvas>
<div id="touch-layer"></div>
<div id="hint">오른쪽을 터치하면 책이 열려요</div>

<div id="ar-panel">
  <div class="hud-glow">
    <div class="hud-frame">
      <div class="hud-header">
        <span class="hud-header-icon">◈</span>
        <span class="hud-header-title">MISSION ALERT</span>
        <span class="hud-header-dots">· · · · ·</span>
      </div>
      <div class="hud-body">
        <span class="hud-main-icon" id="hud-icon">☁</span>
        <div class="hud-mission-title" id="hud-title"></div>
        <p id="hud-msg"></p>
      </div>
      <div class="hud-footer">
        <button class="hud-btn hud-btn-cancel" onclick="closePanel()">[ 뒤로 ]</button>
        <button class="hud-btn hud-btn-go" id="hud-go-btn" onclick="goToNext()"></button>
      </div>
    </div>
  </div>
</div>

<div id="page-num"></div>

<script>
// ════════════════════════════════════════
//  설정
// ════════════════════════════════════════
const SPREADS = [
  'spread1.png',
  'spread2.png',
  'spread3.png',
  'spread4.png',
  'spread5.png',
  'spread6.png',
];
const TOTAL_SPREADS = SPREADS.length;

// AR1 복귀 상태 (caughtCloud → page6부터 시작)
let returnedFromAR1 = !!sessionStorage.getItem('caughtCloud');
let currentPanel = null; // 'ar1' | 'cooking'

// ════════════════════════════════════════
//  캔버스
// ════════════════════════════════════════
const mc   = document.getElementById('main-canvas');
const mCtx = mc.getContext('2d');
const pc   = document.getElementById('page-canvas');
const pCtx = pc.getContext('2d');
const fc   = document.getElementById('flip-canvas');
const fCtx = fc.getContext('2d');
const tl   = document.getElementById('touch-layer');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  W = mc.width = pc.width = fc.width = window.innerWidth;
  H = mc.height= pc.height= fc.height= window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if(phase==='book') drawStatic(); });

// ════════════════════════════════════════
//  이미지 로드
// ════════════════════════════════════════
const coverImg = new Image(); coverImg.src = 'cover.png';
const bgImg    = new Image(); bgImg.src    = 'main2.jpg';



const spreadImgs = {};
SPREADS.forEach(s => {
  const img = new Image(); img.src = s; spreadImgs[s] = img;
});

let coverReady = false, bgReady = false;
coverImg.onload  = () => { coverReady = true; tryStart(); };
bgImg.onload     = () => { bgReady    = true; tryStart(); };
coverImg.onerror = () => { coverReady = true; tryStart(); };
bgImg.onerror    = () => { bgReady    = true; tryStart(); };

function tryStart() {
  if (coverReady && bgReady) startSequence();
}

// ════════════════════════════════════════
//  오디오
// ════════════════════════════════════════
const candleAudio = new Audio('candle.mp3');
candleAudio.loop   = true;
candleAudio.volume = 0;

const rainAudio = new Audio('rain.mp3');
rainAudio.loop   = true;
rainAudio.volume = 0;

function fadeVolume(audio, targetVol, durationMs) {
  const startVol = audio.volume;
  const diff     = targetVol - startVol;
  const steps    = 40;
  const interval = durationMs / steps;
  let step = 0;
  const timer = setInterval(() => {
    step++;
    audio.volume = Math.min(1, Math.max(0, startVol + diff * (step / steps)));
    if (step >= steps) clearInterval(timer);
  }, interval);
}

let phase       = 'black';
let fadeStart   = 0;
const FADE_DUR  = 4400;

// ════════════════════════════════════════
//  촛불
// ════════════════════════════════════════
const candles = [
  { xR:0.36, yR:0.02, r:0.28, phase:0,   speed:0.0017 },
  { xR:0.65, yR:0.08, r:0.25, phase:1.8, speed:0.0021 },
];
function flicker(t, ph, sp) {
  return (Math.sin(t*sp*1.0+ph)*0.40 + Math.sin(t*sp*2.73+ph+0.5)*0.25 +
          Math.sin(t*sp*5.17+ph+1.2)*0.15 + Math.sin(t*sp*9.31+ph+2.1)*0.08 +
          Math.sin(t*sp*17.6+ph+0.9)*0.04) / 0.92;
}
function drawCandles(t) {
  mCtx.fillStyle = 'rgba(0,0,0,0.42)'; mCtx.fillRect(0,0,W,H);
  candles.forEach(c => {
    const f=flicker(t,c.phase,c.speed), cx=W*c.xR, cy=H*c.yR;
    const r=Math.min(W,H)*c.r*(1+f*0.12), a=0.52+f*0.18;
    const gr=mCtx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr.addColorStop(0,`rgba(255,230,150,${a})`);
    gr.addColorStop(0.2,`rgba(255,180,80,${a*0.55})`);
    gr.addColorStop(0.5,`rgba(200,120,40,${a*0.22})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    mCtx.globalCompositeOperation='screen';
    mCtx.fillStyle=gr; mCtx.fillRect(0,0,W,H);
    mCtx.globalCompositeOperation='source-over';
  });
  const vig=mCtx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.6)');
  mCtx.fillStyle=vig; mCtx.fillRect(0,0,W,H);
}
function drawBg() {
  if (bgImg.naturalWidth > 0)
    mCtx.drawImage(bgImg, 0, 0, W, H);
}

// ════════════════════════════════════════
//  메인 루프
// ════════════════════════════════════════
function loop(ts) {
  mCtx.clearRect(0,0,W,H);

  if (phase === 'black') {
    mCtx.fillStyle='#000'; mCtx.fillRect(0,0,W,H);

  } else if (phase === 'fadein') {
    const alpha = Math.min((ts - fadeStart) / FADE_DUR, 1);
    mCtx.fillStyle='#000'; mCtx.fillRect(0,0,W,H);
    if (coverImg.naturalWidth > 0) {
      mCtx.globalAlpha = alpha;
      mCtx.drawImage(coverImg, 0, 0, W, H);
      mCtx.globalAlpha = 1;
    }
    if (alpha > 0.3) {
      mCtx.globalAlpha = (alpha - 0.3) / 0.7;
      drawCandles(ts);
      mCtx.globalAlpha = 1;
    }
    if (alpha >= 1) {
      phase = 'cover';
      hint.style.color = 'rgba(255,220,140,0.75)';
      setTimeout(() => { tl.style.pointerEvents = 'auto'; }, 600);
    }

  } else if (phase === 'cover') {
    mCtx.fillStyle='#000'; mCtx.fillRect(0,0,W,H);
    if (coverImg.naturalWidth > 0) {
      mCtx.drawImage(coverImg, 0, 0, W, H);
    }
    drawCandles(ts);

  } else if (phase === 'book') {
    if (bgImg.naturalWidth > 0) drawBg(1);
    else { mCtx.fillStyle='#1a0f05'; mCtx.fillRect(0,0,W,H); }
    drawCandles(ts);
  }

  requestAnimationFrame(loop);
}

// ════════════════════════════════════════
//  시퀀스 시작
// ════════════════════════════════════════
function startSequence() {
  // ar1에서 구름 따고 돌아온 경우 → page6부터
  if (returnedFromAR1) {
    sessionStorage.removeItem('caughtCloud');
    curSpread = 5;
    phase = 'book';
    drawStatic();
    updateUI();
    tl.style.pointerEvents = 'auto';
    candleAudio.play().catch(()=>{});
    fadeVolume(candleAudio, 0.15, 1500);
    rainAudio.play().catch(()=>{});
    fadeVolume(rainAudio, 0.7, 1500);
    return;
  }
  // 처음 시작 → 표지 페이드인
  setTimeout(() => {
    fadeStart = performance.now();
    phase = 'fadein';
    candleAudio.play().catch(()=>{});
    fadeVolume(candleAudio, 0.15, 4400);
  }, 1000);
}

requestAnimationFrame(loop);

// ════════════════════════════════════════
//  cover → book
// ════════════════════════════════════════
function goToBook() {
  if (phase !== 'cover') return;
  tl.style.pointerEvents = 'none';
  hint.style.color = 'rgba(255,220,140,0)';
  phase = 'book';
  drawStatic();
  updateUI();
  tl.style.pointerEvents = 'auto';
}

// ════════════════════════════════════════
//  페이지 그리기
// ════════════════════════════════════════
let curSpread = 0;
function drawSpread(ctx, name) {
  const img = spreadImgs[name];
  if (img && img.complete && img.naturalWidth > 0)
    ctx.drawImage(img, 0, 0, W, H);
}

function drawStatic() {
  pCtx.clearRect(0,0,W,H);
  fCtx.clearRect(0,0,W,H);
  drawSpread(pCtx, SPREADS[curSpread]);
}

// ════════════════════════════════════════
//  페이지 플립
// ════════════════════════════════════════
let flipping=false, flipDir=1, flipStart2=0;
const FLIP_DUR=650;

function startFlip(dir) {
  if(flipping) return;
  if(dir===1  && curSpread>=TOTAL_SPREADS-1) return;
  if(dir===-1 && curSpread<=0) return;
  flipDir=dir; flipping=true; flipStart2=performance.now();
  doFlip();
}
function doFlip() {
  const prog = Math.min((performance.now()-flipStart2)/FLIP_DUR, 1);
  fCtx.clearRect(0,0,W,H);
  const from = flipDir===1 ? curSpread : curSpread-1;
  const to   = flipDir===1 ? curSpread+1 : curSpread;

  const toImg   = spreadImgs[SPREADS[to]];
  const fromImg = spreadImgs[SPREADS[from]];

  // "to" 스프레드 전체 배경
  if (toImg?.complete && toImg.naturalWidth > 0)
    fCtx.drawImage(toImg, 0, 0, W, H);

  // "from" 스프레드 오른쪽 절반 플립 애니메이션
  flipSlices(fCtx, fromImg, prog);

  // "from" 스프레드 왼쪽 절반 고정
  if (fromImg?.complete && fromImg.naturalWidth > 0) {
    fCtx.save();
    fCtx.beginPath(); fCtx.rect(0, 0, W/2, H); fCtx.clip();
    fCtx.drawImage(fromImg, 0, 0, W, H);
    fCtx.restore();
  }

  if (prog < 1) requestAnimationFrame(doFlip);
  else {
    flipping = false;
    if (flipDir===1) curSpread++; else curSpread--;
    if (curSpread===1 && flipDir===1 && rainAudio.paused) {
      rainAudio.play().catch(()=>{});
      fadeVolume(rainAudio, 0.7, 2000);
    }
    drawStatic(); updateUI();
  }
}
function flipSlices(ctx, img, progress) {
  const spineX = W / 2;
  const sw = W - spineX;
  const p = flipDir===1 ? progress : 1-progress;
  const ease = p<0.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
  const foldX = 1-ease;

  const tmp = document.createElement('canvas');
  tmp.width = Math.ceil(sw); tmp.height = H;
  const tc = tmp.getContext('2d');
  if (img?.complete && img.naturalWidth > 0)
    tc.drawImage(img, spineX, 0, sw, H, 0, 0, Math.ceil(sw), H);

  ctx.save();
  for (let i = 0; i < 60; i++) {
    const t = i/60; if (t >= foldX) continue;
    const t1 = (i+1)/60, xPos = t*foldX;
    const bend = Math.sin(ease*Math.PI)*H*0.05;
    const yB = Math.sin(t*Math.PI)*bend, hSc = 1-Math.abs(yB)/H*0.04;
    const shd = Math.min(0.5, ease*(1-t)*1.1);
    const sX = t*sw, sW = (t1-t)*sw;
    const dX = spineX+xPos*sw, dW = sW*foldX, dY = yB, dH = H*hSc;
    if (dW <= 0) continue;
    ctx.drawImage(tmp, sX, 0, sW, H, dX, dY, Math.max(0.5,dW), dH);
    if (shd>0.02) { ctx.fillStyle=`rgba(0,0,0,${shd*0.6})`; ctx.fillRect(dX,dY,Math.max(0.5,dW),dH); }
    const hl = Math.max(0, 0.12-Math.abs(t-foldX)*3)*(1-ease);
    if (hl>0.01) { ctx.fillStyle=`rgba(255,240,190,${hl})`; ctx.fillRect(dX,dY,Math.max(0.5,dW),dH); }
  }
  ctx.restore();

  const bW = Math.min(sw*(1-foldX)*0.25, sw*0.12), bX = spineX+foldX*sw;
  if (bW > 1) {
    const bg = ctx.createLinearGradient(bX,0,bX+bW,0);
    bg.addColorStop(0,'rgba(200,170,110,0.45)');
    bg.addColorStop(1,'rgba(180,150,90,0.05)');
    ctx.fillStyle = bg; ctx.fillRect(bX, 0, bW, H);
  }
}

// ════════════════════════════════════════
//  패널 데이터
// ════════════════════════════════════════
const PANEL_DATA = {
  ar1: {
    icon:  '☁',
    title: '홍비를 도와주세요!',
    msg:   '비가 와서 구름이 나무에 걸렸어요.<br>키가 작은 홍비 대신<br>구름을 따주세요!',
    btn:   '구름 따러 가기 →'
  },
  cooking: {
    icon:  '🍞',
    title: '구름빵을 만들어요!',
    msg:   '엄마를 도와 구름빵을 만들어요.<br>재료를 찾아서 반죽을 한 후<br>오븐에 넣어주세요.',
    btn:   '재료 찾으러 가기 →'
  }
};

// ════════════════════════════════════════
//  UI & 터치
// ════════════════════════════════════════
function updateUI() {
  const pgNum = document.getElementById('page-num');
  pgNum.style.display = 'block';
  pgNum.textContent = `${curSpread + 1} / ${TOTAL_SPREADS}`;
}

function openPanel(mode) {
  currentPanel = mode;
  const d = PANEL_DATA[mode];
  document.getElementById('hud-icon').textContent  = d.icon;
  document.getElementById('hud-title').textContent = d.title;
  document.getElementById('hud-msg').innerHTML     = d.msg;
  document.getElementById('hud-go-btn').textContent = '[ ' + d.btn + ' ]';
  document.getElementById('ar-panel').classList.add('show');
}

function closePanel() {
  document.getElementById('ar-panel').classList.remove('show');
}

function goToNext() {
  if (currentPanel === 'ar1') {
    location.href = 'ar1.html';
  } else {
    location.href = 'ar2.html';
  }
}

function handleTap(goRight) {
  // 첫 탭에 부모 index.html에 OST 시작 신호
  window.parent.postMessage('ostStart', '*');

  // page5 오른쪽 → ar1 패널 (구름 따기)
  if (goRight && !returnedFromAR1 && curSpread >= 4) {
    openPanel('ar1');
    return;
  }
  // page6 오른쪽 → 요리 패널 (재료 찾기)
  if (goRight && returnedFromAR1 && curSpread >= 5) {
    openPanel('cooking');
    return;
  }
  startFlip(goRight ? 1 : -1);
}

let touchStartX = 0;
tl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
tl.addEventListener('touchend', e => {
  if (phase === 'cover') { goToBook(); return; }
  if (phase !== 'book' || flipping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const goRight = Math.abs(dx) > 30 ? dx < 0 : e.changedTouches[0].clientX > W/2;
  handleTap(goRight);
}, { passive:true });
tl.addEventListener('click', e => {
