<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; overflow:hidden; background:#0a0704; }
    canvas { position:fixed; inset:0; width:100%; height:100%; }
    #bg-canvas  { z-index:0; }
    #page-canvas{ z-index:5;  pointer-events:none; }
    #flip-canvas{ z-index:10; pointer-events:none; }
    #touch-layer{ z-index:20; position:fixed; inset:0; cursor:pointer; pointer-events:none; }
    @keyframes hintPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    /* 힌트 텍스트 */
    #cover-hint {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      color:rgba(255,220,140,0); font-size:15px; font-family:serif;
      letter-spacing:2px; white-space:nowrap;
      text-shadow:0 0 12px rgba(255,180,60,0.8);
      animation:hintPulse 2s ease-in-out infinite;
      z-index:40; pointer-events:none;
      transition: color 0.8s ease;
    }
    #open-overlay { display:none; position:fixed; inset:0; z-index:35; background:#0a0704; opacity:0; }
    #go-ar {
      display:none; position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      padding:13px 30px; background:rgba(20,60,20,0.92); color:#c8ffb0;
      border:1px solid rgba(100,200,80,0.5); border-radius:30px;
      font-size:18px; font-family:serif; letter-spacing:1px;
      cursor:pointer; z-index:200; white-space:nowrap;
      animation:arGlow 2.5s ease-in-out infinite;
    }
    @keyframes arGlow {
      0%,100%{ box-shadow:0 0 14px rgba(60,180,60,0.35); }
      50%    { box-shadow:0 0 30px rgba(60,180,60,0.7); }
    }
    #page-num {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      color:rgba(255,200,100,0.3); font-size:12px; font-family:serif;
      letter-spacing:2px; pointer-events:none; z-index:100; transition:opacity 0.5s;
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="page-canvas"></canvas>
<canvas id="flip-canvas"></canvas>
<div id="touch-layer"></div>
<div id="cover-hint">오른쪽을 터치하면 책이 열려요</div>
<div id="open-overlay"></div>
<button id="go-ar" onclick="location.href='ar.html'">☁ 구름 따러 가기</button>
<div id="page-num"></div>

<script>
// ★ 페이지 설정
// null = 해당 쪽 비움 (배경만 보임)
const SPREADS = [
  ['page1_left.png', 'page1_right.png'],
  ['page2_left.png', 'page2_right.png'],
  ['page3_left.png', 'page3_right.png'],
  ['page4_left.png', 'page4_right.png'],
  ['page5_left.png', 'page5_right.png'],
  ['page6_left.png', 'page6_right.png'],
];
const TOTAL_SPREADS = SPREADS.length;

// 메인이미지2 원본 크기
const ORIG_W = 1088, ORIG_H = 645;

// 페이지 영역 (메인이미지2 원본 픽셀 기준)
const L = { x:200, y:101, w:348, h:498 };  // 왼쪽
const R = { x:543, y:94,  w:377, h:507 };  // 오른쪽

// ── 캔버스
const bgC=document.getElementById('bg-canvas');
const bgCtx=bgC.getContext('2d');
const pgC=document.getElementById('page-canvas');
const pgCtx=pgC.getContext('2d');
const flC=document.getElementById('flip-canvas');
const flCtx=flC.getContext('2d');

let W, H;
// 메인이미지2를 cover로 맞출 때 스케일/오프셋
let imgScale, imgOffX, imgOffY;

function resize() {
  W = bgC.width = pgC.width = flC.width = window.innerWidth;
  H = bgC.height= pgC.height= flC.height= window.innerHeight;
  const sx = W/ORIG_W, sy = H/ORIG_H;
  imgScale = Math.max(sx, sy);
  imgOffX  = (W - ORIG_W*imgScale) / 2;
  imgOffY  = (H - ORIG_H*imgScale) / 2;
}
resize();
window.addEventListener('resize', ()=>{ resize(); if(isBookOpen&&!flipping) drawStatic(); });

// ── 원본 픽셀 → 화면 픽셀 변환
function toScr(ox, oy, ow, oh) {
  return {
    x: imgOffX + ox * imgScale,
    y: imgOffY + oy * imgScale,
    w: ow * imgScale,
    h: oh * imgScale,
  };
}

// ── 이미지 로드
const bgImg   = loadImg('main2.jpg');
const coverImg = loadImg('cover.png');
const allImgs   = {};
SPREADS.forEach(([l,r]) => {
  if(l) allImgs[l]=loadImg(l);
  if(r) allImgs[r]=loadImg(r);
});

function loadImg(src) {
  const img = new Image();
  img.src = src;
  img.onload = ()=>{ if(isBookOpen&&!flipping) drawStatic(); };
  return img;
}

// ══════════════════════════════════════════
//  페이지 그리기 — 이미지 자체가 베지어 모양
//  그냥 제자리에 drawImage만 하면 됨
// ══════════════════════════════════════════
function compositePage(ctx, pageImg, region) {
  const s = toScr(region.x, region.y, region.w, region.h);
  if (pageImg && pageImg.complete && pageImg.naturalWidth > 0) {
    ctx.drawImage(pageImg, s.x, s.y, s.w, s.h);
  }
  // 이미지 없으면 아무것도 안 그림 (배경만 보임)
}

// ══════════════════════════════════════════
//  정적 렌더
// ══════════════════════════════════════════
let curSpread = 0;

function drawStatic() {
  pgCtx.clearRect(0,0,W,H);
  flCtx.clearRect(0,0,W,H);
  const [lSrc, rSrc] = SPREADS[curSpread];
  if(lSrc) compositePage(pgCtx, allImgs[lSrc], L);
  if(rSrc) compositePage(pgCtx, allImgs[rSrc], R);
}

// ══════════════════════════════════════════
//  페이지 플립
// ══════════════════════════════════════════
let flipping=false, flipDir=1, flipProg=0, flipStart=0;
const FLIP_DUR = 650;

function drawFlip(progress) {
  flCtx.clearRect(0,0,W,H);

  const fromSpread = flipDir===1 ? curSpread   : curSpread-1;
  const toSpread   = flipDir===1 ? curSpread+1 : curSpread;

  // 뒤에 깔릴 페이지
  const [toLSrc,toRSrc] = SPREADS[toSpread];
  if(toLSrc) compositePage(flCtx, allImgs[toLSrc], L);
  if(toRSrc) compositePage(flCtx, allImgs[toRSrc], R);

  // 넘어가는 오른쪽 페이지
  const [fromLSrc,fromRSrc] = SPREADS[fromSpread];
  if(fromRSrc) drawFlipSlices(flCtx, allImgs[fromRSrc], R, progress);

  // 왼쪽 덮기
  if(fromLSrc) compositePage(flCtx, allImgs[fromLSrc], L);
}

function drawFlipSlices(ctx, pageImg, region, progress) {
  const s  = toScr(region.x, region.y, region.w, region.h);
  const sw = Math.ceil(s.w), sh = Math.ceil(s.h);

  const p    = flipDir===1 ? progress : 1-progress;
  const ease = p<0.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
  const foldX = 1-ease;

  // 소스 캔버스 — 이미지 그대로 그리기
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = sw; srcCanvas.height = sh;
  const sc = srcCanvas.getContext('2d');
  if (pageImg && pageImg.complete && pageImg.naturalWidth > 0)
    sc.drawImage(pageImg, 0, 0, sw, sh);
  const src = srcCanvas;

  // 슬라이스
  const SLICES=60;
  ctx.save();
  for (let i=0;i<SLICES;i++) {
    const t=i/SLICES;
    if (t>=foldX) continue;
    const t1=(i+1)/SLICES;
    const xPos=t*foldX;
    const bend=Math.sin(ease*Math.PI)*sh*0.05;
    const yB=Math.sin(t*Math.PI)*bend;
    const hSc=1-Math.abs(yB)/sh*0.04;
    const shd=Math.min(0.5,ease*(1-t)*1.1);
    const srcX=t*sw, srcW=(t1-t)*sw;
    const dstX=s.x+xPos*s.w, dstW=srcW*foldX;
    const dstY=s.y+yB, dstH=s.h*hSc;
    if(dstW<=0) continue;
    ctx.drawImage(src, srcX,0,srcW,sh, dstX,dstY, Math.max(0.5,dstW), dstH);
    if(shd>0.02){ ctx.fillStyle=`rgba(0,0,0,${shd*0.6})`; ctx.fillRect(dstX,dstY,Math.max(0.5,dstW),dstH); }
    const hl=Math.max(0,0.12-Math.abs(t-foldX)*3)*(1-ease);
    if(hl>0.01){ ctx.fillStyle=`rgba(255,240,190,${hl})`; ctx.fillRect(dstX,dstY,Math.max(0.5,dstW),dstH); }
  }
  ctx.restore();

  // 뒷면
  const backW=Math.min(s.w*(1-foldX)*0.25,s.w*0.12);
  const backX=s.x+foldX*s.w;
  if(backW>1){
    const bg2=ctx.createLinearGradient(backX,0,backX+backW,0);
    bg2.addColorStop(0,'rgba(200,170,110,0.45)');
    bg2.addColorStop(1,'rgba(180,150,90,0.05)');
    ctx.fillStyle=bg2; ctx.fillRect(backX,s.y,backW,s.h);
  }
}

// ══════════════════════════════════════════
//  촛불
// ══════════════════════════════════════════
const candles=[
  {xR:0.36,yR:0.02,r:0.28,phase:0,  speed:0.0017},
  {xR:0.65,yR:0.08,r:0.25,phase:1.8,speed:0.0021},
];
function flicker(t,ph,sp){
  return(Math.sin(t*sp*1.0+ph)*0.40+Math.sin(t*sp*2.73+ph+0.5)*0.25+
         Math.sin(t*sp*5.17+ph+1.2)*0.15+Math.sin(t*sp*9.31+ph+2.1)*0.08+
         Math.sin(t*sp*17.6+ph+0.9)*0.04)/0.92;
}
function drawBg(t){
  bgCtx.clearRect(0,0,W,H);

  if(STATE === 'black'){
    // 검은 화면
    bgCtx.fillStyle='#000';
    bgCtx.fillRect(0,0,W,H);
    return;
  }

  if(STATE === 'cover'){
    // 표지 이미지 페이드인
    bgCtx.fillStyle='#000';
    bgCtx.fillRect(0,0,W,H);
    if(coverImg.complete && coverImg.naturalWidth>0){
      bgCtx.globalAlpha = coverAlpha;
      bgCtx.drawImage(coverImg, 0, 0, W, H);
      bgCtx.globalAlpha = 1;
    }
    return;
  }

  // STATE === 'book': main2 + 촛불
  if(bgImg.complete&&bgImg.naturalWidth>0){
    const z = (typeof bgZoom !== 'undefined') ? bgZoom : 1;
    const zW = ORIG_W*imgScale*z;
    const zH = ORIG_H*imgScale*z;
    const zX = imgOffX - (zW - ORIG_W*imgScale)/2;
    const zY = imgOffY - (zH - ORIG_H*imgScale)/2;
    bgCtx.drawImage(bgImg, zX, zY, zW, zH);
  } else {
    bgCtx.fillStyle='#1a0f05';
    bgCtx.fillRect(0,0,W,H);
  }
  bgCtx.fillStyle='rgba(0,0,0,0.42)';bgCtx.fillRect(0,0,W,H);
  candles.forEach(c=>{
    const f=flicker(t,c.phase,c.speed),cx=W*c.xR,cy=H*c.yR;
    const r=Math.min(W,H)*c.r*(1+f*0.12),a=0.52+f*0.18;
    const gr=bgCtx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr.addColorStop(0,`rgba(255,230,150,${a})`);
    gr.addColorStop(0.2,`rgba(255,180,80,${a*0.55})`);
    gr.addColorStop(0.5,`rgba(200,120,40,${a*0.22})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    bgCtx.globalCompositeOperation='screen';
    bgCtx.fillStyle=gr;bgCtx.fillRect(0,0,W,H);
    bgCtx.globalCompositeOperation='source-over';
  });
  const vig=bgCtx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.6)');
  bgCtx.fillStyle=vig;bgCtx.fillRect(0,0,W,H);
}

// ══════════════════════════════════════════
//  메인 루프
// ══════════════════════════════════════════
// 상태: 'black'(검은화면) → 'cover'(표지) → 'book'(책)
let STATE = 'black';
let coverAlpha = 0;   // 표지 페이드인 진행도 (0~1)
let isBookOpen = false;
function loop(t){
  drawBg(t);
  if(isBookOpen&&flipping){
    flipProg=Math.min((t-flipStart)/FLIP_DUR,1);
    drawFlip(flipProg);
    if(flipProg>=1){
      flipping=false;
      if(flipDir===1)curSpread++;else curSpread--;
      drawStatic();updateUI();
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// 페이지 로드: 검은화면 → 자동으로 표지 페이드인 → 힌트 등장 → 그때부터 터치 받음
window.addEventListener('load', ()=>{
  // 터치 완전히 막기
  document.getElementById('touch-layer').style.pointerEvents = 'none';

  // 0.6초 검은화면 유지
  setTimeout(()=>{
    STATE = 'cover';
    const startTime = performance.now();
    const dur = 2200; // 2.2초에 걸쳐 밝아짐

    function fadeIn(now){
      const elapsed = now - startTime;
      coverAlpha = Math.min(elapsed / dur, 1);
      if(coverAlpha < 1){
        requestAnimationFrame(fadeIn);
      } else {
        // 완전히 밝아진 후
        coverAlpha = 1;
        // 힌트 텍스트 등장
        document.getElementById('cover-hint').style.color = 'rgba(255,220,140,0.75)';
        // 힌트 뜨고 0.5초 후에 터치 활성화
        setTimeout(()=>{
          document.getElementById('touch-layer').style.pointerEvents = 'auto';
        }, 500);
      }
    }
    requestAnimationFrame(fadeIn);
  }, 600);
});

// ══════════════════════════════════════════
//  인트로
// ══════════════════════════════════════════
// cover는 openBook 안에서 직접 참조
const overlayEl=document.getElementById('open-overlay');

function openBook(){
  if(isBookOpen) return;
  if(STATE !== 'cover') return;  // 표지 상태일 때만 열기 가능
  isBookOpen = true;
  STATE = 'book';

  // 힌트 숨기기
  document.getElementById('cover-hint').style.color='rgba(255,220,140,0)';

  // 검은 오버레이 잠깐 등장
  overlayEl.style.display='block';
  overlayEl.style.opacity='0';
  overlayEl.style.transition='opacity 0.4s ease';
  setTimeout(()=>{ overlayEl.style.opacity='1'; }, 10);

  setTimeout(()=>{
    // main2 줌인→줌아웃
    zoomInBg();
    overlayEl.style.transition='opacity 0.7s ease';
    overlayEl.style.opacity='0';
    setTimeout(()=>{
      overlayEl.style.display='none';
      drawStatic(); updateUI();
    }, 700);
  }, 450);
}

// main2 클로즈업 → 원래 크기로 줌아웃
let bgZoom = 1.35;
function zoomInBg(){
  bgZoom = 1.35;
  const startTime = performance.now();
  const dur = 900;
  function step(t){
    const elapsed = t - startTime;
    const prog = Math.min(elapsed/dur, 1);
    const ease = 1 - Math.pow(1-prog, 3);
    bgZoom = 1.35 - 0.35*ease;
    if(prog < 1) requestAnimationFrame(step);
    else bgZoom = 1;
  }
  requestAnimationFrame(step);
}

function startFlip(dir){
  if(flipping)return;
  if(dir===1&&curSpread>=TOTAL_SPREADS-1)return;
  if(dir===-1&&curSpread<=0)return;
  flipDir=dir;flipProg=0;flipping=true;flipStart=performance.now();
}

function updateUI(){
  const goAR=document.getElementById('go-ar');
  const pgNum=document.getElementById('page-num');
  pgNum.textContent=`${curSpread+1} / ${TOTAL_SPREADS}`;
  if(curSpread>=TOTAL_SPREADS-1){goAR.style.display='block';pgNum.style.opacity='0';}
  else{goAR.style.display='none';pgNum.style.opacity='1';}
}

// 터치/클릭
let touchStartX=0;
const tl=document.getElementById('touch-layer');
tl.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
tl.addEventListener('touchend',e=>{
  if(STATE==='cover'){openBook();return;}
  if(!isBookOpen) return;
  if(flipping)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>30)startFlip(dx<0?1:-1);
  else startFlip(e.changedTouches[0].clientX>W/2?1:-1);
},{passive:true});
tl.addEventListener('click',e=>{
  if(STATE==='cover'){openBook();return;}
  if(!isBookOpen) return;
  if(flipping)return;
  startFlip(e.clientX>W/2?1:-1);
});
// cover 클릭은 touch-layer가 처리
</script>
</body>
</html>
