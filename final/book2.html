<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    canvas { position:fixed; inset:0; width:100%; height:100%; }
    #main-canvas { z-index:0; }
    #page-canvas { z-index:5;  pointer-events:none; }
    #fade-canvas { z-index:10; pointer-events:none; }
    #touch-layer { z-index:20; position:fixed; inset:0; }

    /* ── 엔딩 패널 ── */
    #ending {
      display:none;
      position:fixed; inset:0; z-index:50;
      align-items:center; justify-content:center;
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    }
    #ending.show { display:flex; }
    .ending-card {
      background:rgba(255,245,220,0.13);
      border:1.5px solid rgba(255,220,140,0.35);
      border-radius:18px;
      padding:44px 38px 36px;
      text-align:center;
      max-width:min(88vw,360px);
      backdrop-filter:blur(6px);
      box-shadow:0 0 60px rgba(255,180,60,0.18), 0 0 120px rgba(200,120,20,0.1);
      animation:cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(28px) scale(0.94); }
      to   { opacity:1; transform:none; }
    }
    .ending-cloud {
      font-size:54px;
      filter:drop-shadow(0 0 18px rgba(200,230,255,0.9));
      animation:cloudBob 3s ease-in-out infinite;
      display:block; margin-bottom:18px;
    }
    @keyframes cloudBob {
      0%,100%{ transform:translateY(0); }
      50%    { transform:translateY(-10px); }
    }
    .ending-title {
      font-size:26px; font-weight:700; letter-spacing:6px;
      color:rgba(255,230,140,0.95);
      text-shadow:0 0 20px rgba(255,180,40,0.7);
      margin-bottom:22px;
    }
    .ending-text {
      font-size:14px; line-height:2.1; color:rgba(255,235,195,0.82);
      margin-bottom:28px;
      word-break:keep-all;
    }
    .ending-fin {
      font-size:13px; letter-spacing:4px; color:rgba(255,200,100,0.45);
      margin-bottom:32px;
    }
    .ending-btn {
      display:inline-block;
      border:1px solid rgba(255,210,100,0.5);
      color:rgba(255,220,130,0.85);
      font-size:13px; letter-spacing:2px; padding:12px 28px;
      border-radius:30px; cursor:pointer; background:rgba(255,180,40,0.08);
      transition:background .2s;
      font-family:inherit;
    }
    .ending-btn:active { background:rgba(255,180,40,0.2); }
  </style>
</head>
<body>
<canvas id="main-canvas"></canvas>
<canvas id="page-canvas"></canvas>
<canvas id="fade-canvas"></canvas>
<div id="touch-layer"></div>

<div id="ending">
  <div class="ending-card">
    <span class="ending-cloud">☁</span>
    <div class="ending-title">구름빵</div>
    <p class="ending-text">
      홍비네 가족은 구름빵을 먹고<br>
      하늘을 훨훨 날아올랐어요.<br><br>
      따뜻하고 포슬포슬한 구름빵처럼<br>
      오늘 하루도 행복하게 보내요!
    </p>
    <div class="ending-fin">— 끝 —</div>
    <button class="ending-btn" onclick="goHome()">처음으로 돌아가기</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  캔버스
// ════════════════════════════════════════
const mc   = document.getElementById('main-canvas');
const mCtx = mc.getContext('2d');
const pc   = document.getElementById('page-canvas');
const pCtx = pc.getContext('2d');
const fc   = document.getElementById('fade-canvas');
const fCtx = fc.getContext('2d');
const tl   = document.getElementById('touch-layer');

let W, H;
function resize() {
  W = mc.width = pc.width = fc.width = window.innerWidth;
  H = mc.height= pc.height= fc.height= window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════════════════════
//  이미지 로드
// ════════════════════════════════════════
const spreadImg = new Image();
spreadImg.src = 'book2_spread1.png';
spreadImg.onload  = () => drawStatic();
spreadImg.onerror = () => drawStatic();

function drawStatic() {
  pCtx.clearRect(0,0,W,H);
  if (spreadImg.naturalWidth > 0) pCtx.drawImage(spreadImg, 0, 0, W, H);
}

// ════════════════════════════════════════
//  오디오
// ════════════════════════════════════════
const rainAudio = new Audio('rain.mp3');
rainAudio.loop = true; rainAudio.volume = 0;

function fadeVolume(audio, targetVol, durationMs) {
  const startVol = audio.volume, diff = targetVol - startVol;
  const steps = 40, interval = durationMs / steps;
  let step = 0;
  const timer = setInterval(() => {
    step++;
    audio.volume = Math.min(1, Math.max(0, startVol + diff*(step/steps)));
    if (step >= steps) clearInterval(timer);
  }, interval);
}

// ════════════════════════════════════════
//  촛불
// ════════════════════════════════════════
const candles = [
  { xR:0.36, yR:0.02, r:0.28, phase:0,   speed:0.0017 },
  { xR:0.65, yR:0.08, r:0.25, phase:1.8, speed:0.0021 },
];
function flicker(t, ph, sp) {
  return (Math.sin(t*sp*1.0+ph)*0.40 + Math.sin(t*sp*2.73+ph+0.5)*0.25 +
          Math.sin(t*sp*5.17+ph+1.2)*0.15 + Math.sin(t*sp*9.31+ph+2.1)*0.08 +
          Math.sin(t*sp*17.6+ph+0.9)*0.04) / 0.92;
}
function drawCandles(t) {
  mCtx.fillStyle = 'rgba(0,0,0,0.42)'; mCtx.fillRect(0,0,W,H);
  candles.forEach(c => {
    const f=flicker(t,c.phase,c.speed), cx=W*c.xR, cy=H*c.yR;
    const r=Math.min(W,H)*c.r*(1+f*0.12), a=0.52+f*0.18;
    const gr=mCtx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr.addColorStop(0,`rgba(255,230,150,${a})`);
    gr.addColorStop(0.2,`rgba(255,180,80,${a*0.55})`);
    gr.addColorStop(0.5,`rgba(200,120,40,${a*0.22})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    mCtx.globalCompositeOperation='screen';
    mCtx.fillStyle=gr; mCtx.fillRect(0,0,W,H);
    mCtx.globalCompositeOperation='source-over';
  });
  const vig=mCtx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.6)');
  mCtx.fillStyle=vig; mCtx.fillRect(0,0,W,H);
}

// ════════════════════════════════════════
//  메인 루프
// ════════════════════════════════════════
function loop(ts) {
  mCtx.clearRect(0,0,W,H);
  mCtx.fillStyle = '#1a0f05';
  mCtx.fillRect(0,0,W,H);
  drawCandles(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ════════════════════════════════════════
//  시작
// ════════════════════════════════════════
drawStatic();
tl.style.pointerEvents = 'auto';
rainAudio.play().catch(()=>{});
fadeVolume(rainAudio, 0.6, 1500);

// ════════════════════════════════════════
//  페이드 → 엔딩
// ════════════════════════════════════════
const FADE_DUR    = 3000;  // 3초
const FADE_TARGET = 0.7;   // 70% 어두움
let fading = false;
let endingShown = false;
let fadeStartTime = 0;

function startFade() {
  if (fading || endingShown) return;
  fading = true;
  tl.style.pointerEvents = 'none';
  fadeStartTime = performance.now();
  requestAnimationFrame(doFade);
}

function doFade(ts) {
  const progress = Math.min((ts - fadeStartTime) / FADE_DUR, 1);
  const alpha = progress * FADE_TARGET;

  fCtx.clearRect(0,0,W,H);
  fCtx.fillStyle = `rgba(0,0,0,${alpha})`;
  fCtx.fillRect(0,0,W,H);

  if (progress >= 1) {
    fading = false;
    endingShown = true;
    document.getElementById('ending').classList.add('show');
    return;
  }
  requestAnimationFrame(doFade);
}

function goHome() {
  window.top.location.href = 'index.html';
}

// ════════════════════════════════════════
//  터치
// ════════════════════════════════════════
let touchStartX = 0;
tl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
tl.addEventListener('touchend', e => {
  const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
  if (dx > 40) return; // 스와이프는 무시, 탭만
  startFade();
}, { passive:true });
tl.addEventListener('click', () => startFade());
</script>
</body>
</html>
