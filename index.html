<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a0f05;
    }

    /* ── 나무 테이블 배경 ── */
    #table-bg {
      position: fixed;
      inset: 0;
      background:
        /* 나뭇결 세로 줄 */
        repeating-linear-gradient(
          88deg,
          transparent 0px,
          transparent 38px,
          rgba(0,0,0,0.04) 38px,
          rgba(0,0,0,0.04) 40px
        ),
        /* 나뭇결 가로 */
        repeating-linear-gradient(
          180deg,
          transparent 0px,
          transparent 90px,
          rgba(255,255,255,0.015) 90px,
          rgba(255,255,255,0.015) 92px
        ),
        /* 테이블 기본색 */
        linear-gradient(160deg, #3d2008 0%, #2a1505 40%, #1e0f03 100%);
      z-index: 0;
    }

    /* 테이블 위 주변광 */
    #table-light {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 30%,
        rgba(255,210,120,0.13) 0%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── 책 전체 래퍼 ── */
    /*
      테이블 위에 책이 놓인 느낌:
      약간 기울어지고, 그림자로 입체감
    */
    #book-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #book {
      position: relative;
      width: 320px;
      height: 460px;
      /* 살짝 기울어진 책 */
      transform: rotate(-1.5deg);
      /* 테이블 위 그림자 */
      filter: drop-shadow(0 24px 40px rgba(0,0,0,0.75))
              drop-shadow(0 8px 16px rgba(0,0,0,0.5));
    }

    /* 3D 원근감 */
    #book-pages {
      position: absolute;
      inset: 0;
      perspective: 1400px;
    }

    /* ── 개별 페이지 ── */
    .page {
      position: absolute;
      inset: 0;
      border-radius: 2px 6px 6px 2px;
      overflow: hidden;

      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.77, 0, 0.18, 1);
      backface-visibility: hidden;

      /* 제본 왼쪽 그림자 */
      box-shadow:
        inset 6px 0 18px rgba(0,0,0,0.45),
        inset -2px 0 8px rgba(0,0,0,0.1);
    }

    /* 페이지 이미지 */
    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      /* 오래된 책 느낌: 약간 따뜻한 필터 */
      filter: sepia(0.25) contrast(0.95) brightness(0.92);
    }

    /* 이미지 없을 때 플레이스홀더 */
    .placeholder {
      width: 100%;
      height: 100%;
      background: #f0e0c0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 27px,
          rgba(139,90,43,0.12) 27px, rgba(139,90,43,0.12) 28px
        );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .placeholder-n { font-size: 52px; color: rgba(100,60,20,0.2); font-family: serif; }
    .placeholder-t { font-size: 14px; color: rgba(100,60,20,0.4); text-align: center; line-height: 1.6; font-family: serif; }

    /* 페이지 위 질감 오버레이 */
    .page::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        /* 제본 왼쪽 그림자 */
        linear-gradient(90deg,
          rgba(0,0,0,0.22) 0%,
          rgba(0,0,0,0.07) 10%,
          transparent 28%
        ),
        /* 오른쪽 끝 살짝 어둡게 */
        linear-gradient(270deg,
          rgba(0,0,0,0.06) 0%,
          transparent 15%
        );
      pointer-events: none;
      z-index: 5;
      border-radius: inherit;
    }

    /* 넘어간 페이지 */
    .page.flipped {
      transform: rotateY(-180deg);
    }

    /* 넘어가는 중 */
    .page.turning {
      box-shadow:
        -10px 0 30px rgba(0,0,0,0.5),
        inset 6px 0 18px rgba(0,0,0,0.3);
    }

    /* ── 책 척추(제본부) ── */
    #book-spine {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 14px;
      background: linear-gradient(90deg, #1a0a02, #4a2808 40%, #2a1404);
      border-radius: 2px 0 0 2px;
      z-index: 20;
      box-shadow: inset -3px 0 8px rgba(0,0,0,0.4);
    }

    /* ── 책 가장자리 (쌓인 페이지) ── */
    #book-edge-right {
      position: absolute;
      right: -4px; top: 3px; bottom: 3px;
      width: 5px;
      background: linear-gradient(90deg, #e8d8b0, #d0c090);
      border-radius: 0 2px 2px 0;
      z-index: 9;
    }
    #book-edge-bottom {
      position: absolute;
      bottom: -5px; left: 8px; right: 0;
      height: 6px;
      background: linear-gradient(180deg, #e0d0a8, #c8b888);
      border-radius: 0 0 2px 0;
      z-index: 9;
    }

    /* ── 터치 힌트 ── */
    #touch-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) rotate(-1.5deg);
      color: rgba(255,220,140,0.5);
      font-size: 13px;
      font-family: serif;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      transition: opacity 0.8s;
    }

    /* ── 페이지 번호 ── */
    #page-num {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%) rotate(-1.5deg);
      color: rgba(255,200,100,0.35);
      font-size: 12px;
      font-family: serif;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 100;
    }

    /* ── AR 이동 버튼 (마지막 페이지) ── */
    #go-ar {
      display: none;
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      padding: 13px 30px;
      background: rgba(30, 80, 30, 0.92);
      color: #c8ffb0;
      border: 1px solid rgba(100,200,80,0.4);
      border-radius: 30px;
      font-size: 18px;
      font-family: serif;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 200;
      animation: glowPulse 2.5s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 12px rgba(60,180,60,0.3); }
      50%      { box-shadow: 0 0 28px rgba(60,180,60,0.65); }
    }

    /* ── 좌우 터치 영역 (투명) ── */
    #tap-left, #tap-right {
      position: fixed;
      top: 0; bottom: 0;
      width: 50%;
      z-index: 50;
      cursor: pointer;
    }
    #tap-left  { left: 0; }
    #tap-right { right: 0; }
  </style>
</head>
<body>

<!-- 나무 테이블 배경 -->
<div id="table-bg"></div>
<div id="table-light"></div>

<!-- 터치 영역 -->
<div id="tap-left"  onclick="prevPage()"></div>
<div id="tap-right" onclick="nextPage()"></div>

<!-- ══ 책 ══ -->
<div id="book-wrapper">
  <div id="book">
    <!-- 페이지 렌더링 영역 -->
    <div id="book-pages">

      <!--
      ╔══════════════════════════════════════╗
      ║  페이지 추가/교체 방법               ║
      ║                                      ║
      ║  각 .page 안의 img src를             ║
      ║  본인 이미지 파일명으로 교체하세요   ║
      ║                                      ║
      ║  페이지 추가: 아래 블록 복사 후      ║
      ║  id="pg-5", src="page5.jpg" 변경    ║
      ║  JS의 TOTAL_PAGES 숫자도 변경!      ║
      ╚══════════════════════════════════════╝
      -->

      <!-- 페이지 0: 표지 -->
      <div class="page" id="pg-0">
        <img src="page0.jpg" alt="표지"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="placeholder" style="display:none;">
          <div class="placeholder-n">📖</div>
          <div class="placeholder-t">표지<br>page0.jpg</div>
        </div>
      </div>

      <!-- 페이지 1 -->
      <div class="page" id="pg-1">
        <img src="page1.jpg" alt="1페이지"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="placeholder" style="display:none;">
          <div class="placeholder-n">1</div>
          <div class="placeholder-t">1페이지<br>page1.jpg</div>
        </div>
      </div>

      <!-- 페이지 2 -->
      <div class="page" id="pg-2">
        <img src="page2.jpg" alt="2페이지"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="placeholder" style="display:none;">
          <div class="placeholder-n">2</div>
          <div class="placeholder-t">2페이지<br>page2.jpg</div>
        </div>
      </div>

      <!-- 페이지 3 -->
      <div class="page" id="pg-3">
        <img src="page3.jpg" alt="3페이지"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="placeholder" style="display:none;">
          <div class="placeholder-n">3</div>
          <div class="placeholder-t">3페이지<br>page3.jpg</div>
        </div>
      </div>

      <!-- 페이지 4: 마지막 -->
      <div class="page" id="pg-4">
        <img src="page4.jpg" alt="마지막 페이지"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="placeholder" style="display:none;">
          <div class="placeholder-n">4</div>
          <div class="placeholder-t">마지막 페이지<br>page4.jpg</div>
        </div>
      </div>

    </div><!-- /book-pages -->

    <!-- 책 장식 -->
    <div id="book-spine"></div>
    <div id="book-edge-right"></div>
    <div id="book-edge-bottom"></div>
  </div>
</div>

<!-- UI -->
<div id="page-num">1 / 5</div>
<div id="touch-hint">화면을 터치해서 넘기세요</div>
<button id="go-ar" onclick="goToAR()">☁ 구름 따러 가기</button>

<script>
  // ★ 페이지 수 (페이지 div 개수와 맞추기)
  const TOTAL_PAGES = 5;

  let cur = 0;
  let turning = false;

  // 시작: z-index 설정 (앞 페이지가 위에)
  function init() {
    for (let i = 0; i < TOTAL_PAGES; i++) {
      const pg = document.getElementById('pg-' + i);
      pg.style.zIndex = TOTAL_PAGES - i;
    }
    updateUI();
  }

  // 다음 페이지 (오른쪽 터치)
  function nextPage() {
    if (turning || cur >= TOTAL_PAGES - 1) return;
    const pg = document.getElementById('pg-' + cur);
    turning = true;
    pg.classList.add('turning');
    setTimeout(() => {
      pg.classList.add('flipped');
      pg.style.zIndex = 0;
    }, 30);
    setTimeout(() => {
      pg.classList.remove('turning');
      turning = false;
      cur++;
      updateUI();
    }, 780);
  }

  // 이전 페이지 (왼쪽 터치)
  function prevPage() {
    if (turning || cur <= 0) return;
    const pg = document.getElementById('pg-' + (cur - 1));
    turning = true;
    pg.style.zIndex = TOTAL_PAGES - (cur - 1);
    pg.classList.add('turning');
    setTimeout(() => {
      pg.classList.remove('flipped');
    }, 30);
    setTimeout(() => {
      pg.classList.remove('turning');
      turning = false;
      cur--;
      updateUI();
    }, 780);
  }

  function updateUI() {
    // 페이지 번호
    document.getElementById('page-num').textContent = (cur + 1) + ' / ' + TOTAL_PAGES;

    // 힌트: 3번 넘기면 사라짐
    if (cur >= 2) document.getElementById('touch-hint').style.opacity = '0';

    // 마지막 페이지: AR 버튼 / 힌트 교체
    const goAR = document.getElementById('go-ar');
    const hint = document.getElementById('touch-hint');
    const pageNum = document.getElementById('page-num');
    if (cur === TOTAL_PAGES - 1) {
      goAR.style.display = 'block';
      pageNum.style.opacity = '0';
    } else {
      goAR.style.display = 'none';
      pageNum.style.opacity = '1';
    }
  }

  function goToAR() {
    window.location.href = 'ar.html';
  }

  // 스와이프 지원 (터치 드래그)
  let touchStartX = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 20) return; // 너무 짧은 스와이프 무시
    if (dx < 0) nextPage();  // 왼쪽 스와이프 = 다음
    else        prevPage();  // 오른쪽 스와이프 = 이전
  }, { passive: true });

  init();
</script>
</body>
</html>
