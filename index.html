<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0704; }

    /* 메인 캔버스 — 배경 + 촛불 빛 오버레이 */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
    }

    /* 책 넘기기 캔버스 — 페이지 플립 */
    #flip-canvas {
      position: fixed; inset: 0; z-index: 10;
      width: 100%; height: 100%;
      pointer-events: none; /* 터치는 아래서 처리 */
    }

    /* 터치 캐처 */
    #touch-layer {
      position: fixed; inset: 0; z-index: 20;
      cursor: pointer;
    }

    /* 인트로: 표지 이미지 (메인이미지1) */
    #intro {
      position: fixed; inset: 0; z-index: 30;
      overflow: hidden;
    }
    #intro img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    /* 인트로 탭 힌트 */
    #intro-hint {
      position: absolute;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,220,140,0.7);
      font-size: 15px; font-family: serif; letter-spacing: 2px;
      animation: hintPulse 2s ease-in-out infinite;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(255,180,60,0.8);
    }
    @keyframes hintPulse {
      0%,100% { opacity: 0.5; } 50% { opacity: 1; }
    }

    /* 인트로 → 책 열기 전환 오버레이 */
    #open-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 35;
      background: #0a0704;
      opacity: 0;
    }

    /* AR 버튼 */
    #go-ar {
      display: none;
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      padding: 13px 30px;
      background: rgba(20,60,20,0.92);
      color: #c8ffb0;
      border: 1px solid rgba(100,200,80,0.5);
      border-radius: 30px;
      font-size: 18px; font-family: serif; letter-spacing: 1px;
      cursor: pointer; z-index: 200;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(100,255,80,0.4);
      animation: arGlow 2.5s ease-in-out infinite;
    }
    @keyframes arGlow {
      0%,100% { box-shadow: 0 0 14px rgba(60,180,60,0.35); }
      50%      { box-shadow: 0 0 30px rgba(60,180,60,0.7); }
    }

    /* 페이지 번호 */
    #page-num {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,200,100,0.3);
      font-size: 12px; font-family: serif; letter-spacing: 2px;
      pointer-events: none; z-index: 100;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

<!-- 배경 + 촛불 빛 레이어 -->
<canvas id="bg-canvas"></canvas>

<!-- 페이지 플립 레이어 -->
<canvas id="flip-canvas"></canvas>

<!-- 터치 레이어 -->
<div id="touch-layer"></div>

<!-- 인트로 (표지) -->
<div id="intro">
  <!-- ★ 표지 이미지: 메인이미지1.png -->
  <img src="메인이미지1.png" alt="표지"/>
  <div id="intro-hint">터치하면 책이 열려요</div>
</div>

<!-- 열기 전환용 오버레이 -->
<div id="open-overlay"></div>

<!-- AR 이동 버튼 -->
<button id="go-ar" onclick="location.href='ar.html'">☁ 구름 따러 가기</button>
<div id="page-num"></div>

<script>
// ══════════════════════════════════════════════════
//  ★ 설정: 페이지 이미지 파일명 목록
//    page0 = 첫 펼침 (메인이미지2), 이후 본인 페이지들
// ══════════════════════════════════════════════════
const PAGE_SRCS = [
  '메인이미지2.jpg',   // 첫 펼침 (표지 열리면 나오는 장면)
  'page1.jpg',
  'page2.jpg',
  'page3.jpg',
  'page4.jpg',
];
const TOTAL = PAGE_SRCS.length;

// ── 캔버스 셋업 ──
const bgC   = document.getElementById('bg-canvas');
const bgCtx = bgC.getContext('2d');
const flC   = document.getElementById('flip-canvas');
const flCtx = flC.getContext('2d');

let W, H, BX, BY, BW, BH;

function resize() {
  W = bgC.width  = flC.width  = window.innerWidth;
  H = bgC.height = flC.height = window.innerHeight;
  BW = Math.min(W * 0.94, 680);
  BH = Math.min(H * 0.82, 560);
  BX = (W - BW) / 2;
  BY = (H - BH) / 2;
}
resize();
window.addEventListener('resize', () => { resize(); renderAll(); });

// ── 이미지 로드 ──
// 배경 이미지 (메인이미지2 — 책 펼침 배경)
const bgImg = new Image();
bgImg.src = '메인이미지2.jpg';
bgImg.onload = renderAll;

// 페이지 이미지들
const imgs = PAGE_SRCS.map(src => {
  const img = new Image();
  img.src = src;
  img.onload = () => { if (!flipping) renderAll(); };
  return img;
});

// ══════════════════════════════════════════════════
//  촛불 빛 일렁임 시스템
// ══════════════════════════════════════════════════
/*
  촛불 2개 (이미지에서 보이는 위치 근사)
  각 촛불마다:
  - 중심 밝기 (radial gradient)
  - 랜덤 노이즈로 밝기/반지름 미세 변동
  - 다른 주기로 흔들려서 자연스럽게
*/
const candles = [
  { xR: 0.33, yR: 0.22, r: 0.28, phase: 0,    speed: 0.0017 },
  { xR: 0.68, yR: 0.18, r: 0.25, phase: 1.8,  speed: 0.0021 },
];

// Perlin-like 노이즈 (간단한 sin 합성)
function flicker(t, phase, speed) {
  return (
    Math.sin(t * speed * 1.00 + phase) * 0.40 +
    Math.sin(t * speed * 2.73 + phase + 0.5) * 0.25 +
    Math.sin(t * speed * 5.17 + phase + 1.2) * 0.15 +
    Math.sin(t * speed * 9.31 + phase + 2.1) * 0.08 +
    Math.sin(t * speed * 17.6 + phase + 0.9) * 0.04
  ) / (0.40 + 0.25 + 0.15 + 0.08 + 0.04);
}

let raf = null;

function drawCandles(t) {
  bgCtx.clearRect(0, 0, W, H);

  // 1) 배경: 책 펼침 이미지 (메인이미지2)
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    bgCtx.drawImage(bgImg, 0, 0, W, H);
  } else {
    bgCtx.fillStyle = '#1a0f05';
    bgCtx.fillRect(0, 0, W, H);
  }

  // 2) 전체 어둠 오버레이 (촛불 전후 분위기)
  bgCtx.fillStyle = 'rgba(0,0,0,0.45)';
  bgCtx.fillRect(0, 0, W, H);

  // 3) 각 촛불 빛
  candles.forEach(c => {
    const f   = flicker(t, c.phase, c.speed);
    const cx  = W * c.xR;
    const cy  = H * c.yR;
    const r   = Math.min(W, H) * c.r * (1 + f * 0.12);
    const alpha = 0.55 + f * 0.18;

    const gr = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
    gr.addColorStop(0,   `rgba(255,230,150,${alpha})`);
    gr.addColorStop(0.2, `rgba(255,180,80,${alpha * 0.6})`);
    gr.addColorStop(0.5, `rgba(200,120,40,${alpha * 0.25})`);
    gr.addColorStop(1,   'rgba(0,0,0,0)');

    bgCtx.globalCompositeOperation = 'screen';
    bgCtx.fillStyle = gr;
    bgCtx.fillRect(0, 0, W, H);
    bgCtx.globalCompositeOperation = 'source-over';
  });

  // 4) 책 영역 주변 비네팅 (가장자리 어둡게)
  const vig = bgCtx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.2, W/2, H/2, Math.max(W,H)*0.75);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(1,   'rgba(0,0,0,0.65)');
  bgCtx.fillStyle = vig;
  bgCtx.fillRect(0, 0, W, H);
}

// ══════════════════════════════════════════════════
//  페이지 플립 (Canvas 슬라이스 방식)
// ══════════════════════════════════════════════════
let curPage  = 0;
let flipping = false;
let flipDir  = 1;
let flipProg = 0;
const FLIP_DUR = 650;

function drawPageContent(ctx, img, idx, x, y, w, h) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();

  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x, y, w, h);
    // 따뜻한 오래된 책 오버레이
    ctx.fillStyle = 'rgba(100,60,10,0.10)';
    ctx.fillRect(x, y, w, h);
  } else {
    // 플레이스홀더
    const gr = ctx.createLinearGradient(x, y, x, y+h);
    gr.addColorStop(0, '#f0e0c0'); gr.addColorStop(1, '#e0cc9a');
    ctx.fillStyle = gr; ctx.fillRect(x, y, w, h);
    for (let ly = y+28; ly < y+h; ly+=28) {
      ctx.strokeStyle = 'rgba(139,90,43,0.1)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x,ly); ctx.lineTo(x+w,ly); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(100,60,20,0.18)';
    ctx.font = `bold ${h*0.2}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(idx === 0 ? '📖' : String(idx), x+w/2, y+h/2);
    ctx.fillStyle = 'rgba(100,60,20,0.3)';
    ctx.font = `${13}px serif`;
    ctx.fillText(PAGE_SRCS[idx], x+w/2, y+h/2 + h*0.13);
  }

  // 제본 그림자
  const sg = ctx.createLinearGradient(x, y, x+w*0.14, y);
  sg.addColorStop(0,   'rgba(0,0,0,0.35)');
  sg.addColorStop(0.5, 'rgba(0,0,0,0.07)');
  sg.addColorStop(1,   'transparent');
  ctx.fillStyle = sg; ctx.fillRect(x, y, w, h);

  ctx.restore();
}

function drawFlip(progress) {
  flCtx.clearRect(0, 0, W, H);

  const fromIdx = flipDir === 1 ? curPage     : curPage - 1;
  const toIdx   = flipDir === 1 ? curPage + 1 : curPage;
  const fromImg = imgs[fromIdx];
  const toImg   = toIdx < TOTAL ? imgs[toIdx] : null;

  // 뒤에 깔릴 페이지
  if (toImg) drawPageContent(flCtx, toImg, toIdx, BX, BY, BW, BH);

  // 넘어가는 페이지 슬라이스
  const p = flipDir === 1 ? progress : 1 - progress;
  const ease = p < 0.5
    ? 4*p*p*p
    : 1 - Math.pow(-2*p+2,3)/2;
  const foldX = 1 - ease;

  // 오프스크린에 원본 렌더
  const off = document.createElement('canvas');
  off.width = BW; off.height = BH;
  const oc  = off.getContext('2d');
  drawPageContent(oc, fromImg, fromIdx, 0, 0, BW, BH);

  const SLICES = 60;
  flCtx.save();
  for (let i = 0; i < SLICES; i++) {
    const t  = i / SLICES;
    if (t >= foldX) continue;
    const t1 = (i+1) / SLICES;

    const xPos   = t * foldX;
    const bendAmt= Math.sin(ease * Math.PI) * BH * 0.055;
    const yBend  = Math.sin(t * Math.PI) * bendAmt;
    const hScale = 1 - Math.abs(yBend) / BH * 0.04;
    const shadow = Math.min(0.5, ease * (1-t) * 1.2);

    const sx = t * BW, sw = (t1-t) * BW;
    const dx = BX + xPos * BW;
    const dw = sw * foldX;
    const dy = BY + yBend;
    const dh = BH * hScale;
    if (dw <= 0) continue;

    flCtx.drawImage(off, sx, 0, sw, BH, dx, dy, Math.max(0.5, dw), dh);

    if (shadow > 0.02) {
      flCtx.fillStyle = `rgba(0,0,0,${shadow * 0.65})`;
      flCtx.fillRect(dx, dy, Math.max(0.5,dw), dh);
    }

    const distF = Math.abs(t - foldX);
    const hl    = Math.max(0, 0.14 - distF * 3) * (1-ease);
    if (hl > 0.01) {
      flCtx.fillStyle = `rgba(255,240,190,${hl})`;
      flCtx.fillRect(dx, dy, Math.max(0.5,dw), dh);
    }
  }
  flCtx.restore();

  // 뒷면 살짝
  const backW = Math.min(BW*(1-foldX)*0.28, BW*0.13);
  const backX = BX + foldX * BW;
  if (backW > 1) {
    const bg2 = flCtx.createLinearGradient(backX, 0, backX+backW, 0);
    bg2.addColorStop(0, 'rgba(200,170,110,0.48)');
    bg2.addColorStop(1, 'rgba(180,150,90,0.08)');
    flCtx.fillStyle = bg2;
    flCtx.fillRect(backX, BY, backW, BH);
  }

  // 척추
  flCtx.save();
  const sp = flCtx.createLinearGradient(BX, 0, BX+13, 0);
  sp.addColorStop(0,   '#120601');
  sp.addColorStop(0.5, '#4a2808');
  sp.addColorStop(1,   '#1e0a02');
  flCtx.fillStyle = sp;
  flCtx.fillRect(BX, BY, 12, BH);
  flCtx.restore();
}

function drawStatic() {
  flCtx.clearRect(0, 0, W, H);
  drawPageContent(flCtx, imgs[curPage], curPage, BX, BY, BW, BH);

  // 책 외곽
  flCtx.save();
  flCtx.strokeStyle = 'rgba(0,0,0,0.55)';
  flCtx.lineWidth = 1.2;
  flCtx.beginPath();
  flCtx.roundRect(BX, BY, BW, BH, 4);
  flCtx.stroke();
  flCtx.restore();

  // 척추
  flCtx.save();
  const sp = flCtx.createLinearGradient(BX, 0, BX+13, 0);
  sp.addColorStop(0,   '#120601');
  sp.addColorStop(0.5, '#4a2808');
  sp.addColorStop(1,   '#1e0a02');
  flCtx.fillStyle = sp;
  flCtx.fillRect(BX, BY, 12, BH);
  flCtx.restore();
}

function renderAll() {
  if (!flipping) drawStatic();
}

// ══════════════════════════════════════════════════
//  메인 애니메이션 루프 (촛불 + 페이지 플립)
// ══════════════════════════════════════════════════
let flipStart = 0;
let isBookOpen = false; // 인트로 끝나고 책 열렸는지

function loop(t) {
  // 촛불은 항상 렌더 (인트로 숨겨져 있어도 준비)
  drawCandles(t);

  // 페이지 플립 중이면 진행
  if (flipping) {
    flipProg = Math.min((t - flipStart) / FLIP_DUR, 1);
    drawFlip(flipProg);
    if (flipProg >= 1) {
      flipping = false;
      if (flipDir === 1) curPage++;
      else               curPage--;
      drawStatic();
      updateUI();
    }
  }

  raf = requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════════════
//  인트로: 표지 → 책 열기
// ══════════════════════════════════════════════════
const introEl   = document.getElementById('intro');
const overlayEl = document.getElementById('open-overlay');

function openBook() {
  if (isBookOpen) return;
  isBookOpen = true;

  // 1) 인트로 이미지 줌인 + 페이드아웃
  introEl.style.transition = 'transform 0.9s cubic-bezier(0.4,0,0.2,1), opacity 0.7s 0.3s ease';
  introEl.style.transform  = 'scale(1.18)';
  introEl.style.opacity    = '0';

  // 2) 검은 오버레이로 순간 전환
  overlayEl.style.display  = 'block';
  overlayEl.style.transition = 'opacity 0.35s 0.5s ease';
  overlayEl.style.opacity  = '1';

  setTimeout(() => {
    introEl.style.display = 'none';
    // 3) 오버레이 사라지며 책 등장
    overlayEl.style.transition = 'opacity 0.6s ease';
    overlayEl.style.opacity  = '0';
    setTimeout(() => {
      overlayEl.style.display = 'none';
      // 4) 첫 페이지 플립 (표지 → 메인이미지2)
      //    책이 바로 펼쳐진 채로 등장하므로 플립 생략
      //    그냥 정적으로 첫 페이지 보여줌
      drawStatic();
      updateUI();
    }, 650);
  }, 650);
}

// ── UI 업데이트 ──
function updateUI() {
  const goAR   = document.getElementById('go-ar');
  const pgNum  = document.getElementById('page-num');

  pgNum.textContent = isBookOpen ? `${curPage+1} / ${TOTAL}` : '';

  if (curPage === TOTAL - 1) {
    goAR.style.display = 'block';
    pgNum.style.opacity = '0';
  } else {
    goAR.style.display = 'none';
    pgNum.style.opacity = '1';
  }
}

// ── 터치/클릭 처리 ──
let touchStartX = 0;
const touchLayer = document.getElementById('touch-layer');
const introHint  = document.querySelector('#intro-hint');

touchLayer.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

touchLayer.addEventListener('touchend', e => {
  if (!isBookOpen) { openBook(); return; }
  if (flipping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 30) {
    startFlip(dx < 0 ? 1 : -1);
  } else {
    startFlip(e.changedTouches[0].clientX > W/2 ? 1 : -1);
  }
}, { passive: true });

touchLayer.addEventListener('click', e => {
  if (!isBookOpen) { openBook(); return; }
  if (flipping) return;
  startFlip(e.clientX > W/2 ? 1 : -1);
});

// 인트로 영역 직접 클릭도 처리
introEl.addEventListener('click', () => { if (!isBookOpen) openBook(); });

function startFlip(dir) {
  if (flipping) return;
  if (dir === 1  && curPage >= TOTAL-1) return;
  if (dir === -1 && curPage <= 0)       return;
  flipDir   = dir;
  flipProg  = 0;
  flipping  = true;
  flipStart = performance.now();
}
</script>
</body>
</html>
