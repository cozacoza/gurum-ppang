<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>구름빵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0f05; }

    /* 나무 테이블 배경 */
    #table-bg {
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(88deg, transparent 0px, transparent 38px, rgba(0,0,0,0.04) 38px, rgba(0,0,0,0.04) 40px),
        repeating-linear-gradient(180deg, transparent 0px, transparent 90px, rgba(255,255,255,0.015) 90px, rgba(255,255,255,0.015) 92px),
        linear-gradient(160deg, #3d2008 0%, #2a1505 40%, #1e0f03 100%);
      z-index: 0;
    }
    #table-light {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(255,210,120,0.13) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
    }

    /* 캔버스 */
    #book-canvas {
      position: fixed; inset: 0;
      z-index: 10;
      touch-action: none;
    }

    /* AR 버튼 */
    #go-ar {
      display: none;
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      padding: 13px 30px;
      background: rgba(30,80,30,0.92);
      color: #c8ffb0;
      border: 1px solid rgba(100,200,80,0.4);
      border-radius: 30px;
      font-size: 18px; font-family: serif; letter-spacing: 1px;
      cursor: pointer; z-index: 200;
      animation: glowPulse 2.5s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 12px rgba(60,180,60,0.3); }
      50%      { box-shadow: 0 0 28px rgba(60,180,60,0.65); }
    }

    /* 힌트 */
    #hint {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,220,140,0.45);
      font-size: 13px; font-family: serif; letter-spacing: 1px;
      pointer-events: none; z-index: 100;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
<div id="table-bg"></div>
<div id="table-light"></div>
<canvas id="book-canvas"></canvas>
<button id="go-ar" onclick="location.href='ar.html'">☁ 구름 따러 가기</button>
<div id="hint">화면을 터치해서 넘기세요</div>

<script>
// ══════════════════════════════════════════
//  설정값
// ══════════════════════════════════════════

// ★ 페이지 이미지 파일명 목록 (순서대로)
const PAGE_SRCS = [
  'page0.jpg',
  'page1.jpg',
  'page2.jpg',
  'page3.jpg',
  'page4.jpg',
];

// 책 크기 비율 (화면 대비)
const BOOK_RATIO_W = 0.82;
const BOOK_RATIO_H = 0.72;

// ══════════════════════════════════════════
//  캔버스 & 상태
// ══════════════════════════════════════════
const canvas = document.getElementById('book-canvas');
const ctx    = canvas.getContext('2d');

let W, H, BX, BY, BW, BH; // 화면/책 좌표

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  BW = Math.min(W * BOOK_RATIO_W, 360);
  BH = Math.min(H * BOOK_RATIO_H, 520);
  BX = (W - BW) / 2;
  BY = (H - BH) / 2;
}
resize();
window.addEventListener('resize', () => { resize(); render(); });

// 이미지 로드
const imgs = PAGE_SRCS.map(src => {
  const img = new Image();
  img.src = src;
  img.onload = render;
  return img;
});

const TOTAL = PAGE_SRCS.length;
let curPage  = 0;    // 현재 보이는 페이지 인덱스

// 페이지 넘기기 애니메이션 상태
let flipping     = false;  // 애니메이션 진행 중?
let flipDir      = 1;      // 1=다음, -1=이전
let flipProgress = 0;      // 0.0 ~ 1.0
let flipRAF      = null;

// ══════════════════════════════════════════
//  그리기 유틸
// ══════════════════════════════════════════

// 이미지 or 플레이스홀더를 클리핑 된 영역에 그리기
function drawPageContent(img, idx, x, y, w, h) {
  ctx.save();
  ctx.rect(x, y, w, h);
  ctx.clip();

  if (img.complete && img.naturalWidth > 0) {
    // 이미지 있음: sepia 느낌 (실제 filter는 canvas에서 제한적이므로 overlay로 대체)
    ctx.drawImage(img, x, y, w, h);
    // 오래된 책 오버레이
    ctx.fillStyle = 'rgba(120,80,20,0.08)';
    ctx.fillRect(x, y, w, h);
  } else {
    // 플레이스홀더
    const gr = ctx.createLinearGradient(x, y, x, y+h);
    gr.addColorStop(0, '#f0e0c0');
    gr.addColorStop(1, '#e0cc9a');
    ctx.fillStyle = gr;
    ctx.fillRect(x, y, w, h);
    // 줄 노트
    for (let ly = y+28; ly < y+h; ly += 28) {
      ctx.strokeStyle = 'rgba(139,90,43,0.1)';
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x+w, ly); ctx.stroke();
    }
    // 번호
    ctx.fillStyle = 'rgba(100,60,20,0.18)';
    ctx.font = `bold ${Math.min(w,h)*0.22}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(idx === 0 ? '📖' : String(idx), x+w/2, y+h/2);
    ctx.fillStyle = 'rgba(100,60,20,0.28)';
    ctx.font = `${14}px serif`;
    ctx.fillText(PAGE_SRCS[idx], x+w/2, y+h/2 + Math.min(w,h)*0.15);
  }

  // 제본 그림자 (왼쪽)
  const sg = ctx.createLinearGradient(x, y, x+w*0.18, y);
  sg.addColorStop(0,   'rgba(0,0,0,0.30)');
  sg.addColorStop(0.4, 'rgba(0,0,0,0.07)');
  sg.addColorStop(1,   'transparent');
  ctx.fillStyle = sg;
  ctx.fillRect(x, y, w, h);

  ctx.restore();
}

// 책 외곽 그림자
function drawBookShadow() {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur  = 40;
  ctx.shadowOffsetX = 6;
  ctx.shadowOffsetY = 20;
  ctx.fillStyle = 'rgba(0,0,0,0.01)';
  ctx.beginPath();
  ctx.roundRect(BX, BY, BW, BH, 4);
  ctx.fill();
  ctx.restore();
}

// 책 척추(제본)
function drawSpine() {
  ctx.save();
  const sg = ctx.createLinearGradient(BX, 0, BX+14, 0);
  sg.addColorStop(0,   '#120601');
  sg.addColorStop(0.5, '#4a2808');
  sg.addColorStop(1,   '#1e0a02');
  ctx.fillStyle = sg;
  ctx.fillRect(BX, BY, 12, BH);
  ctx.restore();
}

// ══════════════════════════════════════════
//  핵심: 구부러지는 종이 넘기기
// ══════════════════════════════════════════
/*
  원리:
  종이가 왼쪽 제본에서 오른쪽으로 넘어갈 때
  오른쪽 끝이 먼저 접히고, 중간은 곡선으로 구부러짐.

  구현:
  - 넘어가는 페이지를 여러 세로 "슬라이스"로 나눔
  - 각 슬라이스마다 x위치에 따라 y오프셋(곡선 구부러짐) 계산
  - Canvas의 drawImage 소스 영역 + 변환 행렬로 슬라이스 그리기
  - 뒷면(다음/이전 페이지 살짝 보임)도 그려서 입체감
*/
function drawFlippingPage(progress) {
  // progress: 0=시작, 1=완료
  // flipDir: 1=다음으로 넘기기, -1=이전으로 돌아오기

  // 넘어가는 페이지 (현재)
  const fromIdx = flipDir === 1 ? curPage : curPage - 1;
  // 넘어간 후 보이는 페이지
  const toIdx   = flipDir === 1 ? curPage + 1 : curPage;

  const fromImg = imgs[fromIdx];
  const toImg   = toIdx < TOTAL ? imgs[toIdx] : null;

  // 1) 뒤에 깔릴 페이지 먼저 그리기
  if (toImg !== null) {
    drawPageContent(toImg, toIdx, BX, BY, BW, BH);
  }

  // 2) 넘어가는 페이지를 슬라이스로 분해
  //    p=0: 페이지가 오른쪽에 펼쳐져 있음
  //    p=1: 왼쪽으로 완전히 넘어감
  const p = flipDir === 1 ? progress : (1 - progress);

  // 슬라이스 수 (많을수록 부드럽지만 느림)
  const SLICES = 60;
  const sliceW = BW / SLICES;

  // 오프스크린 캔버스에 원본 페이지 그리기
  const offscreen = document.createElement('canvas');
  offscreen.width  = BW;
  offscreen.height = BH;
  const offCtx = offscreen.getContext('2d');

  if (fromImg.complete && fromImg.naturalWidth > 0) {
    offCtx.drawImage(fromImg, 0, 0, BW, BH);
    offCtx.fillStyle = 'rgba(120,80,20,0.08)';
    offCtx.fillRect(0, 0, BW, BH);
  } else {
    // 플레이스홀더
    const gr = offCtx.createLinearGradient(0, 0, 0, BH);
    gr.addColorStop(0, '#f0e0c0'); gr.addColorStop(1, '#e0cc9a');
    offCtx.fillStyle = gr; offCtx.fillRect(0, 0, BW, BH);
    for (let ly = 28; ly < BH; ly += 28) {
      offCtx.strokeStyle = 'rgba(139,90,43,0.1)'; offCtx.lineWidth = 0.8;
      offCtx.beginPath(); offCtx.moveTo(0, ly); offCtx.lineTo(BW, ly); offCtx.stroke();
    }
    offCtx.fillStyle = 'rgba(100,60,20,0.18)';
    offCtx.font = `bold ${BH*0.22}px serif`;
    offCtx.textAlign = 'center'; offCtx.textBaseline = 'middle';
    offCtx.fillText(fromIdx === 0 ? '📖' : String(fromIdx), BW/2, BH/2);
  }

  ctx.save();

  for (let i = 0; i < SLICES; i++) {
    // 각 슬라이스의 원본 x 비율 (0~1)
    const t  = i / SLICES;
    const t1 = (i + 1) / SLICES;

    // ── 접힘 곡선 계산 ──
    // 종이가 넘어갈 때:
    //   오른쪽 부분이 먼저 들리고
    //   왼쪽(제본 쪽)은 나중에 따라옴
    //
    // 각 슬라이스의 "보이는 x 위치" 계산
    // p=0: 전체 펼쳐짐(t → t 그대로)
    // p=1: 완전히 넘어감 (x가 음수 = 화면 밖)

    // 접히는 정도: 오른쪽일수록 먼저 접힘
    // 베지어 곡선으로 자연스러운 가속도 표현
    const ease = p < 0.5
      ? 4 * p * p * p
      : 1 - Math.pow(-2*p + 2, 3) / 2;

    // 슬라이스 x 위치 (접힘 반영)
    // 종이 오른쪽 끝이 왼쪽으로 이동
    const foldX = 1 - ease;  // 0: 왼쪽 끝, 1: 오른쪽 끝
    const xPos  = t * foldX; // 슬라이스 위치 (0~foldX 범위로 압축)

    // y 오프셋: 종이 구부러짐
    // 중간 지점에서 가장 많이 구부러짐
    const bendAmt = Math.sin(ease * Math.PI) * BH * 0.06;
    const yBend   = Math.sin(t * Math.PI) * bendAmt;

    // 슬라이스 높이 (구부러지면 살짝 늘어남처럼 보임)
    const hScale = 1 - Math.abs(yBend) / BH * 0.04;

    // 명암: 접히는 중간(오른쪽)은 더 어둡게
    // 오른쪽 끝 부분은 뒷면이 보이기 시작
    const distFromFold = Math.abs(t - foldX);
    const shadow = Math.min(0.5, ease * (1 - t) * 1.2);

    // 뒷면이 보이기 시작하는 지점 (foldX 오른쪽)
    if (t >= foldX) continue; // 접힌 부분은 그리지 않음

    const sx  = t  * BW;
    const sw  = (t1 - t) * BW;
    const dx  = BX + xPos * BW;
    const dw  = sw * foldX; // 압축된 너비
    const dy  = BY + yBend;
    const dh  = BH * hScale;

    if (dw <= 0) continue;

    // 슬라이스 그리기
    ctx.drawImage(offscreen,
      sx, 0, sw, BH,
      dx, dy, Math.max(0.5, dw), dh
    );

    // 슬라이스 위에 명암 오버레이
    if (shadow > 0.02) {
      ctx.fillStyle = `rgba(0,0,0,${shadow * 0.7})`;
      ctx.fillRect(dx, dy, Math.max(0.5, dw), dh);
    }

    // 하이라이트 (접히는 선 근처)
    const highlight = Math.max(0, 0.15 - distFromFold * 3) * (1 - ease);
    if (highlight > 0.01) {
      ctx.fillStyle = `rgba(255,240,200,${highlight})`;
      ctx.fillRect(dx, dy, Math.max(0.5, dw), dh);
    }
  }

  // 뒷면 살짝 보이기 (접힌 부분 오른쪽)
  const foldEdge = (1 - (p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2));
  if (foldEdge < 0.98) {
    const backW = Math.min(BW * (1 - foldEdge) * 0.3, BW * 0.15);
    const backX = BX + foldEdge * BW;
    if (backW > 1) {
      const backGr = ctx.createLinearGradient(backX, 0, backX + backW, 0);
      backGr.addColorStop(0, 'rgba(200,170,120,0.5)');
      backGr.addColorStop(1, 'rgba(180,150,100,0.1)');
      ctx.fillStyle = backGr;
      ctx.fillRect(backX, BY, backW, BH);
    }
  }

  ctx.restore();
}

// ══════════════════════════════════════════
//  메인 렌더
// ══════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);

  drawBookShadow();

  if (flipping) {
    drawFlippingPage(flipProgress);
  } else {
    // 정지 상태: 현재 페이지만
    drawPageContent(imgs[curPage], curPage, BX, BY, BW, BH);
  }

  drawSpine();

  // 책 외곽선
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(BX, BY, BW, BH, 4);
  ctx.stroke();
  ctx.restore();
}

// ══════════════════════════════════════════
//  애니메이션
// ══════════════════════════════════════════
const FLIP_DURATION = 620; // ms

function startFlip(dir) {
  if (flipping) return;
  if (dir === 1  && curPage >= TOTAL - 1) return;
  if (dir === -1 && curPage <= 0)         return;

  flipDir      = dir;
  flipProgress = 0;
  flipping     = true;

  const start = performance.now();

  function step(now) {
    flipProgress = Math.min((now - start) / FLIP_DURATION, 1);
    render();

    if (flipProgress < 1) {
      flipRAF = requestAnimationFrame(step);
    } else {
      // 완료
      flipping = false;
      if (flipDir === 1) curPage++;
      else               curPage--;
      render();
      updateUI();
    }
  }
  flipRAF = requestAnimationFrame(step);
}

function updateUI() {
  const hint  = document.getElementById('hint');
  const goAR  = document.getElementById('go-ar');

  if (curPage >= 2) hint.style.opacity = '0';
  else              hint.style.opacity = '1';

  if (curPage === TOTAL - 1) {
    goAR.style.display = 'block';
    hint.style.opacity = '0';
  } else {
    goAR.style.display = 'none';
  }
}

// ══════════════════════════════════════════
//  입력 처리
// ══════════════════════════════════════════
let touchStartX = 0, touchStartY = 0;

// 터치
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > Math.abs(dx) * 1.5) return; // 수직 스크롤 무시
  if (Math.abs(dx) > 30) {
    startFlip(dx < 0 ? 1 : -1);
  } else {
    // 짧은 탭: 오른쪽 반 = 다음, 왼쪽 반 = 이전
    const x = e.changedTouches[0].clientX;
    startFlip(x > W / 2 ? 1 : -1);
  }
}, { passive: true });

// 마우스 클릭 (PC 테스트용)
canvas.addEventListener('click', e => {
  startFlip(e.clientX > W / 2 ? 1 : -1);
});

// ══════════════════════════════════════════
//  시작
// ══════════════════════════════════════════
render();
updateUI();
</script>
</body>
</html>
