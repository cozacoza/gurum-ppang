<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/></head>
<body style="background:#000; color:white; font-family:monospace; padding:20px;">
<h3>이미지 로드 테스트</h3>
<div id="log"></div>
<br>
<img id="cover-test" src="cover.png" style="max-width:300px; border:2px solid red;"/>
<br><br>
<img id="main2-test" src="main2.jpg" style="max-width:300px; border:2px solid blue;"/>

<script>
function log(msg) {
  document.getElementById('log').innerHTML += '<div>' + msg + '</div>';
}

const cover = document.getElementById('cover-test');
cover.onload  = () => log('✅ cover.png 로드 성공! 크기: ' + cover.naturalWidth + 'x' + cover.naturalHeight);
cover.onerror = () => log('❌ cover.png 로드 실패!');

const main2 = document.getElementById('main2-test');
main2.onload  = () => log('✅ main2.jpg 로드 성공! 크기: ' + main2.naturalWidth + 'x' + main2.naturalHeight);
main2.onerror = () => log('❌ main2.jpg 로드 실패!');
</script>
</body>
</html>
