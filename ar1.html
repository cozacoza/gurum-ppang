<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>구름빵 AR — 구름 따기</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { overflow:hidden; background:#000; font-family:'Malgun Gothic','맑은 고딕',sans-serif; }

    #camera {
      position:fixed; inset:0; width:100%; height:100%;
      object-fit:cover; z-index:0;
    }

    /* ── iOS 권한 요청 ── */
    #permission-overlay {
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,0.88);
      color:white; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:32px; gap:20px;
    }
    #permission-overlay h2 { font-size:22px; }
    #permission-overlay p  { font-size:15px; color:#ccc; line-height:1.8; }
    #permission-btn {
      background:#00c864; color:#003a18; border:none;
      padding:16px 40px; border-radius:30px;
      font-size:20px; font-weight:700; cursor:pointer;
    }

    /* ── 거리 HUD ── */
    #distance-hud {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#00ff80;
      font-size:14px; padding:8px 18px; border-radius:20px;
      z-index:999; white-space:nowrap; pointer-events:none;
    }

    /* ── CSS 구름 ── */
    #cloud-wrap {
      position:fixed; top:18%; left:50%; transform:translateX(-50%);
      z-index:10; display:none;
      flex-direction:column; align-items:center;
      animation:cloudFloat 3s ease-in-out infinite;
    }
    #cloud-wrap.visible { display:flex; }
    @keyframes cloudFloat {
      0%,100% { transform:translateX(-50%) translateY(0); }
      50%      { transform:translateX(-50%) translateY(-22px); }
    }

    .cloud-body {
      position:relative;
      width:min(220px,54vw); height:min(90px,22vw);
      background:rgba(255,255,255,0.92);
      border-radius:999px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.5),
        0 12px 40px rgba(0,0,0,0.25),
        0 0 60px rgba(200,230,255,0.5);
      filter:drop-shadow(0 0 18px rgba(180,220,255,0.7));
    }
    /* 구름 위 볼록한 부분들 */
    .cloud-body::before {
      content:'';
      position:absolute;
      width:47%; height:160%;
      background:rgba(245,250,255,0.95);
      border-radius:50%;
      top:-55%; left:18%;
      box-shadow:0 0 0 2px rgba(255,255,255,0.4);
    }
    .cloud-body::after {
      content:'';
      position:absolute;
      width:35%; height:130%;
      background:rgba(240,248,255,0.90);
      border-radius:50%;
      top:-38%; left:50%;
      box-shadow:0 0 0 2px rgba(255,255,255,0.3);
    }
    /* 작은 반짝임 */
    .cloud-sparkle {
      position:absolute; font-size:min(16px,4vw);
      animation:sparkle 2s ease-in-out infinite;
      pointer-events:none;
    }
    .cloud-sparkle:nth-child(1){ top:-20%; left:10%; animation-delay:0s; }
    .cloud-sparkle:nth-child(2){ top:-30%; right:15%; animation-delay:0.7s; }
    .cloud-sparkle:nth-child(3){ top:-10%; right:8%;  animation-delay:1.3s; }
    @keyframes sparkle {
      0%,100%{ opacity:0.3; transform:scale(0.8); }
      50%     { opacity:1;   transform:scale(1.2); }
    }

    /* ── 잡기 버튼 ── */
    #catch-btn {
      display:none;
      position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
      background:rgba(0,200,100,0.92); color:#003a18;
      border:none; padding:16px 36px; border-radius:30px;
      font-size:22px; font-weight:700; cursor:pointer; z-index:999;
      animation:pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ transform:translateX(-50%) scale(1); }
      50%     { transform:translateX(-50%) scale(1.06); }
    }

    /* ── 너무 멀어요 ── */
    #too-far {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.75); color:white;
      flex-direction:column; align-items:center; justify-content:center;
      z-index:998; text-align:center; padding:32px;
    }
    #too-far h2  { font-size:24px; margin-bottom:12px; }
    #too-far p   { font-size:16px; line-height:1.8; color:#aaa; }
    #too-far .dist-text { font-size:28px; color:#f0c060; margin:16px 0; }

    /* ── 수집 애니메이션 ── */
    #cloud-wrap.catching {
      animation:cloudCatch 0.8s ease-in forwards;
    }
    @keyframes cloudCatch {
      0%  { transform:translateX(-50%) translateY(0) scale(1); opacity:1; }
      100%{ transform:translateX(-50%) translateY(-120px) scale(0.1); opacity:0; }
    }
  </style>
</head>
<body>

<video id="camera" autoplay muted playsinline></video>

<div id="permission-overlay">
  <h2>☁ 구름빵 AR</h2>
  <p>구름을 찾으려면<br>위치와 카메라 권한이 필요해요</p>
  <button id="permission-btn" onclick="requestPermissions()">시작하기</button>
</div>

<div id="distance-hud">📍 위치 확인 중...</div>

<!-- CSS 구름 -->
<div id="cloud-wrap">
  <div class="cloud-body">
    <span class="cloud-sparkle">✨</span>
    <span class="cloud-sparkle">⭐</span>
    <span class="cloud-sparkle">✨</span>
  </div>
</div>

<button id="catch-btn" onclick="catchCloud()">☁ 구름 따기!</button>

<div id="too-far">
  <h2>☁ 구름이 저 멀리 있어요!</h2>
  <div class="dist-text" id="far-dist-text">— m</div>
  <p>나무 앞으로<br>이동해주세요 🌳</p>
</div>

<script>
  const TARGET_LAT    = 37.6524186;
  const TARGET_LNG    = 127.0149809;
  const CATCH_RADIUS  = 15;
  const VISIBLE_RADIUS = 80;

  const hud       = document.getElementById('distance-hud');
  const catchBtn  = document.getElementById('catch-btn');
  const tooFar    = document.getElementById('too-far');
  const farText   = document.getElementById('far-dist-text');
  const cloudWrap = document.getElementById('cloud-wrap');

  async function requestPermissions() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== 'granted') {
          alert('방향 센서 권한을 허용해야 AR이 정상 작동해요.');
          return;
        }
      } catch(e) {}
    }
    document.getElementById('permission-overlay').style.display = 'none';

    // 카메라 시작
    navigator.mediaDevices
      .getUserMedia({ video:{ facingMode:'environment' }, audio:false })
      .then(s => { document.getElementById('camera').srcObject = s; })
      .catch(() => {});

    startGPS();
  }

  function startGPS() {
    if (!navigator.geolocation) {
      hud.textContent = '⚠ GPS를 지원하지 않는 브라우저예요';
      return;
    }
    navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy:true, maximumAge:3000, timeout:10000
    });
  }

  function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function onPosition(pos) {
    const { latitude, longitude } = pos.coords;
    const dist = Math.round(calcDistance(latitude, longitude, TARGET_LAT, TARGET_LNG));

    hud.textContent = `📍 나무까지 ${dist}m`;

    if (dist <= CATCH_RADIUS) {
      hud.style.background = 'rgba(0,160,80,0.7)';
      cloudWrap.classList.add('visible');
      catchBtn.style.display = 'block';
      tooFar.style.display   = 'none';
    } else if (dist <= VISIBLE_RADIUS) {
      hud.style.background = 'rgba(0,0,0,0.6)';
      cloudWrap.classList.add('visible');
      catchBtn.style.display = 'none';
      tooFar.style.display   = 'none';
    } else {
      hud.style.background = 'rgba(0,0,0,0.6)';
      cloudWrap.classList.remove('visible');
      catchBtn.style.display = 'none';
      tooFar.style.display   = 'flex';
      farText.textContent    = `${dist}m`;
    }
  }

  function onError(err) {
    hud.textContent = '⚠ GPS 권한을 허용해주세요';
  }

  function catchCloud() {
    catchBtn.style.display = 'none';
    cloudWrap.classList.remove('visible');
    cloudWrap.style.display = 'flex';
    cloudWrap.classList.add('catching');
    hud.textContent = '☁ 구름을 땄어요!';
    setTimeout(() => {
      sessionStorage.setItem('caughtCloud', '1');
      window.location.href = 'book1.html';
    }, 900);
  }
</script>
</body>
</html>
